<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="MasterSplitter — Dashboard">
    <title>MasterSplitter</title>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div id="toast" class="toast"></div>

    <!-- MAIN APP CONTAINER -->
    <div id="app-container" class="app-container">

        <!-- Top Header -->
        <header class="app-header">
            <div class="header-left">
                <button class="hamburger-btn" onclick="openHamburgerMenu()">☰</button>
                <div class="user-greeting">
                    <span data-i18n="lobby_hello">שלום, </span><strong id="user-name-display">...</strong>
                </div>
            </div>
            <div class="header-right">
                <button class="theme-toggle-btn" onclick="toggleTheme()" title="Toggle Theme" id="theme-toggle-btn">☀️</button>
            </div>
        </header>

        <!-- Side Drawer (Hamburger Menu) -->
        <div id="menu-overlay" class="menu-overlay" onclick="closeHamburgerMenu()"></div>
        <div id="hamburger-menu" class="hamburger-menu">
            <div class="hamburger-menu-header">
                <h2 class="header-brand">MASTER<span class="purple-text">SPLITTER</span></h2>
                <button class="close-menu-btn" onclick="closeHamburgerMenu()">✕</button>
            </div>
            <div class="hamburger-menu-body">
                <button class="menu-item" onclick="showLobby(); closeHamburgerMenu();" data-i18n="menu_my_trips">🌍 הטיולים שלי</button>
                <button class="menu-item" onclick="switchTab('home'); closeHamburgerMenu();" data-i18n="menu_dashboard">🏠 דשבורד</button>
                <button class="menu-item" onclick="switchTab('balances'); closeHamburgerMenu();" data-i18n="menu_balances">📊 יתרות</button>
                <button class="menu-item" onclick="window.location.href='/profile';" data-i18n="menu_profile">👤 פרופיל</button>
                <div class="menu-divider"></div>
                <button class="menu-item danger" onclick="logout()" data-i18n="menu_logout">⎋ התנתק</button>
            </div>
        </div>

        <!-- Activity Drawer -->
        <div id="activity-drawer" class="hamburger-menu activity-drawer">
            <div class="menu-header">
                <h3 data-i18n="activity_title">פעילות</h3>
                <button class="close-menu-btn" onclick="closeActivityDrawer()">✕</button>
            </div>
            <div id="activity-list" class="activity-timeline" style="padding: 20px;">
                <div class="loading-state" data-i18n="loading">טוען...</div>
            </div>
        </div>

        <!-- SCREENS -->
        <div class="screens-container">

            <!-- LOBBY SCREEN -->
            <div id="screen-lobby" class="screen active">
                <div class="lobby-header">
                    <h2 data-i18n="lobby_my_trips">הטיולים שלי</h2>
                    <button class="primary-btn sm" onclick="openCreateTripModal()" data-i18n="lobby_btn_create">+ צור טיול חדש</button>
                </div>
                <div id="trips-list" class="trips-grid">
                    <div class="loading-state" data-i18n="loading">טוען...</div>
                </div>
            </div>

            <!-- HOME DASHBOARD SCREEN -->
            <div id="screen-home" class="screen">
                <div class="trip-banner card">
                    <div class="trip-banner-content">
                        <div class="trip-info">
                            <span class="trip-icon">✈️</span>
                            <div class="trip-details">
                                <span class="trip-select-label" id="trip-name-label">...</span>
                                <span class="trip-dates" id="trip-participants-label" data-i18n="loading">טוען...</span>
                            </div>
                        </div>
                        <div style="display: flex; align-items: center; gap: 10px;">
                            <button class="activity-bell-btn" onclick="openActivityDrawer()" title="Activity Feed" style="background: rgba(255,255,255,0.15); border: none; border-radius: 50%; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: white; transition: background 0.2s;">🔔</button>
                            <div class="trip-participants" id="trip-avatars"></div>
                        </div>
                    </div>
                </div>

                <!-- Swappable Budget Card -->
                <div class="flip-card-container">
                    <div class="flip-card-inner" id="budget-flip-card">
                        
                        <!-- Front: Budget summary -->
                        <div class="flip-card-front card budget-card">
                            <button class="flip-btn" onclick="toggleBudgetCard()" title="Show Categories">📊</button>
                            <div class="budget-main">
                                <div class="stat-col text-right">
                                    <span class="budget-label" data-i18n="home_total_budget">סה"כ תקציב</span>
                                    <strong class="budget-value dark-text" id="total-budget">₪0</strong>
                                </div>
                                <div class="budget-circle-wrapper">
                                    <div class="budget-circle-new">
                                        <span class="circle-percent" id="circle-percent">0%</span>
                                        <span class="circle-label" data-i18n="home_spent">הוצא</span>
                                    </div>
                                </div>
                                <div class="stat-col text-left">
                                    <span class="budget-label" data-i18n="home_spent">הוצא</span>
                                    <strong class="budget-value dark-text" id="total-spent">₪0</strong>
                                    <div style="margin-top: 10px;"></div>
                                    <span class="budget-label" data-i18n="home_left">נותר</span>
                                    <strong class="budget-value purple-text" id="budget-left">₪0</strong>
                                </div>
                            </div>
                        </div>
                        
                        <!-- Back: Category Chart -->
                        <div class="flip-card-back card budget-card">
                            <button class="flip-btn" onclick="toggleBudgetCard()" title="Show Budget">🔙</button>
                            <h4 style="text-align:center; margin-bottom: 15px; color: var(--text-dark);" data-i18n="expenses_title">הוצאות לפי קטגוריה</h4>
                            <div class="category-chart-container" id="category-chart">
                                <!-- Bars injected via JS -->
                            </div>
                        </div>

                    </div>
                </div>

                <div class="recent-expenses-header">
                    <h3 data-i18n="home_recent_expenses">הוצאות אחרונות</h3>
                    <a href="#" class="view-all-link" onclick="switchTab('expenses'); return false;" data-i18n="home_view_all">הצג הכל</a>
                </div>
                <div class="card expenses-list-card">
                    <div id="home-expenses-list">
                        <div class="loading-state" data-i18n="loading">טוען...</div>
                    </div>
                </div>
            </div>

            <!-- EXPENSES SCREEN -->
            <div id="screen-expenses" class="screen">
                <div class="card">
                    <h3 class="screen-title" data-i18n="expenses_title">כל ההוצאות</h3>
                    <div id="expenses-list"><div class="loading-state" data-i18n="loading">טוען...</div></div>
                </div>
            </div>

            <!-- ADD EXPENSE SCREEN -->
            <div id="screen-add" class="screen">
                <div class="card">
                    <h3 class="screen-title" data-i18n="expense_add_title">הוספת הוצאה</h3>

                    <!-- Receipt Scanner -->
                    <button class="scan-receipt-btn" onclick="triggerReceiptScan()" data-i18n="scan_receipt">📷 סרוק קבלה</button>
                    <input type="file" id="receipt-file-input" accept="image/*" style="display:none;" onchange="uploadReceipt(this.files[0])">
                    <div id="scanned-items-container" class="scanned-items-container" style="display:none;"></div>

                    <label data-i18n="expense_what">על מה היה?</label>
                    <input type="text" id="desc" data-i18n="expense_what_ph" placeholder="למשל: ארוחת ערב, מונית...">

                    <label style="margin-top:16px;" data-i18n="expense_amount">סכום</label>
                    <div class="currency-row">
                        <div class="amount-col">
                            <input type="number" id="amount" placeholder="0" min="0" step="0.01">
                        </div>
                        <div class="currency-col">
                            <select id="currency">
                                <optgroup label="מועדפים">
                                    <option value="USD">$ USD</option>
                                    <option value="EUR">€ EUR</option>
                                    <option value="ILS" selected>₪ ILS</option>
                                </optgroup>
                                <optgroup label="מטבעות נוספים">
                                    <option value="GBP">£ GBP</option>
                                    <option value="JPY">¥ JPY</option>
                                    <option value="CHF">₣ CHF</option>
                                    <option value="AUD">A$ AUD</option>
                                    <option value="CAD">C$ CAD</option>
                                </optgroup>
                            </select>
                        </div>
                    </div>

                    <label style="margin-top:16px;" data-i18n="expense_category">קטגוריה</label>
                    <select id="category">
                        <option value="אוכל" data-i18n="cat_food">🍕 אוכל</option>
                        <option value="לינה" data-i18n="cat_lodging">🛏️ לינה</option>
                        <option value="תחבורה" data-i18n="cat_transport">🚕 תחבורה</option>
                        <option value="אטרקציות" data-i18n="cat_attractions">🎟️ אטרקציות</option>
                        <option value="כללי" selected data-i18n="cat_general">💡 כללי</option>
                    </select>

                    <label style="margin-top:16px;" data-i18n="expense_for_who">עבור מי?</label>
                    <div class="participants-pills" id="participants-container"></div>

                    <!-- Split Mode Toggle -->
                    <div class="split-toggle-wrapper" style="margin-top:14px;">
                        <label class="split-toggle-label">
                            <input type="checkbox" id="split-mode-toggle" onchange="toggleSplitMode()">
                            <span class="split-toggle-slider"></span>
                            <span class="split-toggle-text" data-i18n="split_custom">סכומים מותאמים</span>
                        </label>
                    </div>
                    <div id="custom-splits-container" class="custom-splits-container" style="display:none;"></div>
                    <div id="split-validation-msg" class="split-validation-msg" style="display:none;"></div>

                    <button class="primary-btn full-width" style="margin-top:20px;" onclick="addExpense()" data-i18n="expense_btn_save">שמור הוצאה</button>
                </div>
            </div>

            <!-- BALANCES SCREEN -->
            <div id="screen-balances" class="screen">
                <div class="card">
                    <h3 class="screen-title" data-i18n="balances_title">סיכומים ויתרות</h3>
                    <div id="balances-list"></div>
                </div>
            </div>

        </div>

        <div class="bottom-nav">
            <button class="nav-item" onclick="switchTab('home')" id="tab-home">
                <span class="nav-icon">🏠</span><span data-i18n="tab_home">בית</span>
            </button>
            <button class="nav-item" onclick="switchTab('expenses')" id="tab-expenses">
                <span class="nav-icon">🧾</span><span data-i18n="tab_expenses">הוצאות</span>
            </button>
            <div class="nav-add-btn-wrapper">
                <button class="nav-add-btn" onclick="switchTab('add')" id="tab-add">+</button>
                <span class="nav-add-label" data-i18n="tab_add">הוסף</span>
            </div>
            <button class="nav-item" onclick="switchTab('balances')" id="tab-balances">
                <span class="nav-icon">📊</span><span data-i18n="tab_balances">סיכומים</span>
            </button>
            <button class="nav-item" onclick="window.location.href='/profile'" id="tab-profile">
                <span class="nav-icon">👤</span><span data-i18n="tab_profile">פרופיל</span>
            </button>
        </div>
    </div>

    <!-- ================ CREATE TRIP MODAL ================ -->
    <div id="create-trip-modal" class="modal-overlay">
        <div class="modal-card">
            <div class="modal-header">
                <h3 data-i18n="create_trip_title">צור טיול חדש ✈️</h3>
                <button class="modal-close-btn" onclick="closeCreateTripModal()">✕</button>
            </div>

            <div class="form-group">
                <label data-i18n="create_trip_name">שם הטיול / יעד</label>
                <input type="text" id="trip-name" data-i18n="create_trip_name_ph" placeholder="למשל: תאילנד, פריז...">
            </div>

            <div class="form-group">
                <label data-i18n="create_trip_budget">תקציב (₪)</label>
                <input type="number" id="trip-budget" placeholder="0" min="0">
            </div>

            <div class="form-group">
                <label data-i18n="create_trip_invite">הזמן חברים (אימייל או טלפון)</label>
                <div class="friend-add-row">
                    <input type="text" id="friend-input" data-i18n="create_trip_invite_ph" placeholder="הכנס טלפון או אימייל">
                    <button class="add-friend-btn" onclick="addFriend()">+</button>
                </div>
                <div id="friends-chips" class="friends-chips"></div>
            </div>

            <div class="modal-actions">
                <button class="secondary-btn" onclick="closeCreateTripModal()" data-i18n="btn_cancel">ביטול</button>
                <button class="primary-btn" onclick="createTrip()" data-i18n="create_trip_btn">צור טיול</button>
            </div>
        </div>
    </div>

    <!-- ================ EDIT TRIP MODAL ================ -->
    <div id="edit-trip-modal" class="modal-overlay">
        <div class="modal-card">
            <div class="modal-header">
                <h3 data-i18n="modal_edit_trip">✏️ עריכת טיול</h3>
                <button class="modal-close-btn" onclick="closeEditTripModal()">✕</button>
            </div>

            <div class="form-group">
                <label data-i18n="create_trip_name">שם הטיול</label>
                <input type="text" id="edit-trip-name" placeholder="שם הטיול">
            </div>

            <div class="form-group">
                <label data-i18n="create_trip_budget">תקציב (₪)</label>
                <input type="number" id="edit-trip-budget" placeholder="0" min="0">
            </div>

            <div class="form-group">
                <label data-i18n="modal_invite_new">הזמן חברים חדשים</label>
                <div class="friend-add-row">
                    <input type="text" id="edit-friend-input" data-i18n="create_trip_invite_ph" placeholder="הכנס טלפון או אימייל">
                    <button class="add-friend-btn" onclick="addEditFriend()">+</button>
                </div>
                <div id="edit-friends-chips" class="friends-chips"></div>
            </div>

            <div class="modal-actions">
                <button class="secondary-btn" onclick="closeEditTripModal()" data-i18n="btn_cancel">ביטול</button>
                <button class="primary-btn" onclick="saveEditTrip()" data-i18n="btn_save">שמור</button>
            </div>
        </div>
    </div>

    <!-- ================ EDIT EXPENSE MODAL ================ -->
    <div id="edit-expense-modal" class="modal-overlay">
        <div class="modal-card">
            <div class="modal-header">
                <h3 data-i18n="modal_edit_expense">✏️ עריכת הוצאה</h3>
                <button class="modal-close-btn" onclick="closeEditExpenseModal()">✕</button>
            </div>

            <input type="hidden" id="edit-expense-id">

            <div class="form-group">
                <label data-i18n="expense_what">על מה היה?</label>
                <input type="text" id="edit-expense-desc" placeholder="...">
            </div>

            <div class="form-group">
                <label data-i18n="expense_amount">סכום</label>
                <div class="currency-row">
                    <div class="amount-col">
                        <input type="number" id="edit-expense-amount" placeholder="0" min="0" step="0.01">
                    </div>
                    <div class="currency-col">
                        <select id="edit-expense-currency">
                            <option value="ILS">₪ ILS</option>
                            <option value="USD">$ USD</option>
                            <option value="EUR">€ EUR</option>
                            <option value="GBP">£ GBP</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label data-i18n="expense_category">קטגוריה</label>
                <select id="edit-expense-category">
                    <option value="אוכל" data-i18n="cat_food">🍕 אוכל</option>
                    <option value="לינה" data-i18n="cat_lodging">🛏️ לינה</option>
                    <option value="תחבורה" data-i18n="cat_transport">🚕 תחבורה</option>
                    <option value="אטרקציות" data-i18n="cat_attractions">🎟️ אטרקציות</option>
                    <option value="כללי" data-i18n="cat_general">💡 כללי</option>
                </select>
            </div>

            <div class="modal-actions">
                <button class="secondary-btn" onclick="closeEditExpenseModal()" data-i18n="btn_cancel">ביטול</button>
                <button class="primary-btn" onclick="saveEditExpense()" data-i18n="btn_save">שמור</button>
            </div>
        </div>
    </div>

    <script src="/static/js/translations.js"></script>
    <script src="/static/js/main.js"></script>

    <!-- Scanning Overlay -->
    <div id="scan-overlay" class="scan-overlay" style="display:none;">
        <div class="scan-rings">
            <div class="scan-ring ring1"></div>
            <div class="scan-ring ring2"></div>
            <div class="scan-ring ring3"></div>
            <span class="scan-text" data-i18n="scan_scanning">סורק...</span>
        </div>
    </div>

    <!-- Confetti Container -->
    <div id="confetti-container" class="confetti-container"></div>
</body>
</html>
