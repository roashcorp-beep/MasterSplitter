<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}?v=2.2">

    <script>
        const savedTheme = localStorage.getItem('theme') || 'dark';
        if (savedTheme === 'light') {
            document.documentElement.classList.add('light-theme');
        }
    </script>

    <style>
        body {
            font-family: 'Inter', 'Heebo', sans-serif;
            background-color: var(--bg-main, #0a0a1a);
            color: var(--text-main, #e2e8f0);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .profile-container {
            width: 100%;
            max-width: 500px;
            background: var(--surface-card, #12122a);
            border-radius: 24px;
            padding: 32px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border, rgba(255, 255, 255, 0.05));
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Back Button */
        .header-actions {
            width: 100%;
            display: flex;
            justify-content: flex-start;
            margin-bottom: 20px;
        }

        .icon-back-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-main, #e2e8f0);
            width: 40px;
            height: 40px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            padding: 0;
        }

        .icon-back-btn:hover {
            background: rgba(168, 85, 247, 0.2);
            border-color: #a855f7;
            transform: translateX(3px);
        }

        /* Avatar */
        .avatar-wrapper {
            position: relative;
            width: 120px;
            height: 120px;
            border-radius: 50%;
            cursor: pointer;
            background: linear-gradient(135deg, #a855f7, #ec4899);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 42px;
            font-weight: bold;
            color: white;
            box-shadow: 0 8px 20px rgba(168, 85, 247, 0.4);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            overflow: hidden;
            margin-bottom: 16px;
        }

        .avatar-wrapper:hover {
            transform: scale(1.05);
            box-shadow: 0 12px 25px rgba(168, 85, 247, 0.6);
        }

        .avatar-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }

        .avatar-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
            color: white;
        }

        .avatar-wrapper:hover .avatar-overlay {
            opacity: 1;
        }

        #avatarInput {
            display: none;
        }

        /* User Details */
        .user-name {
            font-size: 24px;
            font-weight: 700;
            margin: 0 0 8px 0;
            text-align: center;
        }

        .user-email {
            font-size: 14px;
            color: var(--text-muted, #94a3b8);
            margin: 0 0 4px 0;
            text-align: center;
        }

        .user-phone {
            font-size: 13px;
            color: var(--text-muted, #94a3b8);
            margin: 0 0 32px 0;
            text-align: center;
            direction: ltr;
            unicode-bidi: embed;
        }

        /* Accordions */
        .accordion-item {
            width: 100%;
            margin-bottom: 12px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: background 0.3s ease;
        }

        .accordion-header {
            padding: 16px 20px;
            cursor: pointer;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .accordion-header:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .accordion-content {
            display: none;
            padding: 0 20px 20px 20px;
        }

        .accordion-content.expanded {
            display: block;
        }

        /* Inputs & Buttons */
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 16px;
        }

        input,
        select {
            width: 100%;
            padding: 12px 16px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(0, 0, 0, 0.2);
            color: var(--text-main, #e2e8f0);
            font-family: inherit;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        input:focus,
        select:focus {
            border-color: #a855f7;
        }

        button.action-btn {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: none;
            background: linear-gradient(135deg, #a855f7, #ec4899);
            color: white;
            font-weight: bold;
            font-family: inherit;
            cursor: pointer;
            transition: opacity 0.3s ease, transform 0.1s ease;
        }

        button.action-btn:hover {
            opacity: 0.9;
        }

        button.action-btn:active {
            transform: scale(0.98);
        }

        .hidden {
            display: none !important;
        }

        .feedback {
            font-size: 13px;
            margin-top: 4px;
        }

        .feedback.success {
            color: #4ade80;
        }

        .feedback.error {
            color: #f87171;
        }

        /* ====================================================
           LIGHT THEME FIXES
           ==================================================== */
        .light-theme .profile-container {
            background: #ffffff;
            border-color: #e2e8f0;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }

        .light-theme .accordion-item {
            background: #f8fafc;
            border-color: #e2e8f0;
        }

        .light-theme .accordion-header:hover {
            background: #f1f5f9;
        }

        .light-theme input,
        .light-theme select {
            background: #ffffff;
            border: 1px solid #94a3b8;
            color: #0f172a;
            box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.05);
        }

        .light-theme input:focus,
        .light-theme select:focus {
            border-color: #a855f7;
            box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.15);
        }

        .light-theme .user-name {
            color: #0f172a;
        }

        .light-theme .user-email,
        .light-theme .user-phone {
            color: #475569;
        }

        .light-theme .icon-back-btn {
            color: #0f172a;
            border-color: #cbd5e1;
            background: #f8fafc;
        }

        .light-theme .icon-back-btn:hover {
            background: #e2e8f0;
        }
    </style>
</head>

<body>

    <div class="profile-container">
        <div class="header-actions">
            <button class="icon-back-btn" onclick="window.location.href='/app'" title="Back">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="9 18 15 12 9 6"></polyline>
                </svg>
                <span style="display:none" data-i18n="profile_back"></span>
            </button>
        </div>

        <div class="avatar-wrapper" id="avatarWrapper" title="החלף תמונת פרופיל">
            <span id="avatarInitials">?</span>
            <img id="avatarImg" class="avatar-image" alt="User Avatar">
            <div class="avatar-overlay">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
                    <circle cx="12" cy="13" r="4"></circle>
                </svg>
            </div>
            <input type="file" id="avatarInput" accept="image/*">
        </div>

        <h2 class="user-name" id="userNameDisplay">...</h2>
        <p class="user-email" id="userEmailDisplay">...</p>
        <p class="user-phone" id="userPhoneDisplay">...</p>

        <div class="accordion-item">
            <div class="accordion-header" onclick="toggleAccordion('usernameAcc')">
                <span data-i18n="profile_change_username">שינוי שם משתמש</span>
                <span class="chevron">▼</span>
            </div>
            <div class="accordion-content" id="usernameAcc">
                <div class="input-group" style="margin-top: 10px;">
                    <input type="text" id="usernameInput" data-i18n="profile_new_name_ph" placeholder="שם משתמש חדש">
                </div>
                <button class="action-btn" onclick="saveUsername()" data-i18n="profile_save_name_btn">שמור</button>
            </div>
        </div>

        <div class="accordion-item">
            
            <!-- Feedback -->
            <div class="accordion-header" onclick="toggleAccordion('feedbackAcc')">
                <span data-i18n="profile_feedback">שלח משוב</span>
                <span class="chevron">▼</span>
            </div>
            <div class="accordion-content" id="feedbackAcc">
                <div class="input-group" style="margin-top: 10px;">
                    <textarea id="feedbackInput" data-i18n="profile_feedback_ph" placeholder="המשוב שלך כאן..." rows="3" style="resize:none; width:100%; border-radius:8px; padding:12px 16px; background:rgba(0,0,0,0.2); border:1px solid rgba(255,255,255,0.1); color:var(--text-main); outline:none; font-family:inherit;"></textarea>
                </div>
                <button class="action-btn" onclick="submitFeedbackForm()" style="margin-top: 10px;" data-i18n="btn_save">שמור</button>
            </div>
            <div class="accordion-header" onclick="toggleAccordion('languageAcc')">
                <span data-i18n="profile_change_language">שינוי שפה</span>
                <span class="chevron">▼</span>
            </div>
            <div class="accordion-content" id="languageAcc">
                <div class="input-group" style="margin-top: 10px;">
                    <select id="languageSelect">
                        <option value="he">עברית</option>
                        <option value="en">English</option>
                    </select>
                </div>
                <button class="action-btn" onclick="saveLanguage()" style="margin-top: 10px;" data-i18n="profile_save_lang_btn">שמור שפה</button>
            </div>
        </div>

        <div class="accordion-item">
            <div class="accordion-header" onclick="toggleAccordion('currencyAcc')">
                <span data-i18n="profile_change_currency">מטבע ברירת מחדל</span>
                <span class="chevron">▼</span>
            </div>
            <div class="accordion-content" id="currencyAcc">
                <div class="input-group" style="margin-top: 10px;">
                    <select id="currencySelect">
                        <option value="ILS">₪ ILS - שקל חדש</option>
                        <option value="USD">$ USD - US Dollar</option>
                        <option value="EUR">€ EUR - Euro</option>
                        <option value="GBP">£ GBP - British Pound</option>
                        <option value="THB">฿ THB - Thai Baht</option>
                        <option value="JPY">¥ JPY - Japanese Yen</option>
                        <option value="CAD">$ CAD - Canadian Dollar</option>
                        <option value="AUD">$ AUD - Australian Dollar</option>
                        <option value="CHF">CHF - Swiss Franc</option>
                    </select>
                </div>
                <button class="action-btn" onclick="saveCurrency()" style="margin-top: 10px;" data-i18n="profile_save_currency_btn">שמור מטבע</button>
            </div>
        </div>

        <div class="accordion-item">
            <div class="accordion-header" onclick="toggleAccordion('passwordAcc')">
                <span data-i18n="profile_change_pwd">שינוי סיסמה</span>
                <span class="chevron">▼</span>
            </div>
            <div class="accordion-content" id="passwordAcc">
                <div id="step1Password" style="margin-top: 10px;">
                    <div class="input-group">
                        <input type="password" id="currentPassword" data-i18n="profile_current_pwd_ph" placeholder="סיסמה נוכחית">
                    </div>
                    <button class="action-btn" onclick="verifyPassword()" data-i18n="profile_verify_btn">בדיקה</button>
                </div>

                <div id="step2Password" class="hidden" style="margin-top: 10px;">
                    <div class="input-group">
                        <input type="password" id="newPassword" data-i18n="profile_new_pwd_ph" placeholder="סיסמה חדשה">
                    </div>
                    <div class="input-group">
                        <input type="password" id="confirmNewPassword" data-i18n="profile_confirm_pwd_ph" placeholder="אימות סיסמה חדשה">
                    </div>
                    <button class="action-btn" onclick="changePassword()" data-i18n="profile_save_pwd">אישור</button>
                </div>
            </div>
        </div>

        <div class="accordion-item">
            <div class="accordion-header" onclick="toggleAccordion('phoneAcc')">
                <span data-i18n="profile_change_phone">עדכון מספר טלפון</span>
                <span class="chevron">▼</span>
            </div>
            <div class="accordion-content" id="phoneAcc">
                <div class="input-group" style="margin-top: 10px;">
                    <input type="tel" id="phoneInput" data-i18n="profile_phone_ph" placeholder="מספר טלפון חדש" style="direction:ltr; unicode-bidi:embed;">
                </div>
                <button class="action-btn" onclick="savePhone()" style="margin-top: 10px;" data-i18n="profile_save_phone_btn">שמור טלפון</button>
            </div>
        </div>

        <div class="accordion-item">
            <div class="accordion-header" onclick="toggleAccordion('tutorialAcc')">
                <span data-i18n="profile_tutorial">מדריך שימוש</span>
                <span class="chevron">▼</span>
            </div>
            <div class="accordion-content" id="tutorialAcc">
                <div style="margin-top: 14px; text-align: center;">
                    <div style="background: rgba(255,255,255,0.04); border: 2px dashed rgba(168,85,247,0.3); border-radius: 16px; padding: 32px 16px; color: var(--text-sec);">
                        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="opacity:0.5; margin-bottom:12px;"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>
                        <p style="font-weight: 700; font-size: 0.95rem; margin-bottom: 6px;" data-i18n="profile_tutorial_coming">סרטון הדרכה בקרוב!</p>
                        <p style="font-size: 0.82rem; color: var(--text-muted);" data-i18n="profile_tutorial_desc">כאן יופיע סרטון הדרכה שילמד אותך כיצד להשתמש באפליקציה.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/translations.js') }}?v=2.2"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}?v=2.2"></script>

    <!-- Global Toast for Profile -->
    <div id="toast" class="toast"></div>

    <script>
        async function submitFeedbackForm() {
            const textEl = document.getElementById('feedbackInput');
            const text = textEl.value.trim();
            if (!text) {
                showToast(typeof i18n === 'function' ? i18n('err_fill_all') : 'Please fill all fields', 'error');
                return;
            }
            try {
                const res = await fetch('/api/feedback', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({content: text})
                });
                const data = await res.json();
                if (data.success) {
                    showToast(typeof i18n === 'function' ? (currentLang === 'he' ? 'המשוב נשלח בהצלחה!' : 'Feedback sent!') : 'Feedback sent!', 'success');
                    textEl.value = '';
                    toggleAccordion('feedbackAcc');
                } else {
                    showToast(data.error || 'Error sending feedback', 'error');
                }
            } catch(e) {
                showToast('Network error', 'error');
            }
        }

        // שינינו את השם של המשתנה כדי שלא יתנגש עם main.js!
        let profileUserData = null;

        document.addEventListener('DOMContentLoaded', () => {
            if (localStorage.getItem('theme') === 'light') {
                document.body.classList.add('light-theme');
            }
            fetchUserData();
        });

        async function fetchUserData() {
            try {
                const res = await fetch('/api/me');
                if (res.ok) {
                    const data = await res.json();
                    profileUserData = data;
                    renderUserData();
                    // Apply translations after data loads
                    if (typeof setLanguage === 'function') {
                        setLanguage(data.language || 'he');
                    }
                } else {
                    window.location.href = '/';
                }
            } catch (err) {
                console.error('Error fetching user data', err);
                document.getElementById('userNameDisplay').textContent = 'שגיאת תקשורת';
                document.getElementById('userEmailDisplay').textContent = 'אנא נסה לרענן את העמוד';
            }
        }

        function renderUserData() {
            if (!profileUserData) return;

            document.getElementById('userNameDisplay').textContent = profileUserData.name || 'Unknown';
            document.getElementById('userEmailDisplay').textContent = profileUserData.email || (typeof i18n === 'function' ? i18n('profile_no_email') : 'לא מוגדר אימייל');

            // Phone display
            const phoneEl = document.getElementById('userPhoneDisplay');
            if (phoneEl) {
                phoneEl.textContent = profileUserData.phone || (typeof i18n === 'function' ? i18n('profile_no_phone') : 'לא מוגדר טלפון');
            }

            document.getElementById('usernameInput').value = profileUserData.name || '';
            const langSelect = document.getElementById('languageSelect');
            if (langSelect) langSelect.value = profileUserData.language || 'he';
            const currSelect = document.getElementById('currencySelect');
            if (currSelect) currSelect.value = profileUserData.default_currency || 'ILS';

            const initials = document.getElementById('avatarInitials');
            const img = document.getElementById('avatarImg');

            if (profileUserData.avatar_url) {
                img.src = profileUserData.avatar_url;
                img.style.display = 'block';
                initials.style.display = 'none';
            } else {
                const nameStr = profileUserData.name || '?';
                const words = nameStr.trim().split(/\s+/);
                let initText = '';

                if (words.length >= 2) {
                    initText = words[0].charAt(0) + words[1].charAt(0);
                } else {
                    initText = nameStr.substring(0, 2);
                }

                initials.textContent = initText.toUpperCase();
                img.style.display = 'none';
                initials.style.display = 'block';
            }

            try {
                if (typeof setupCustomDropdowns === 'function') {
                    setupCustomDropdowns();
                }
            } catch (e) {
                console.error("Custom dropdown failed, using native:", e);
            }
        }

        const avatarWrapper = document.getElementById('avatarWrapper');
        const avatarInput = document.getElementById('avatarInput');

        avatarWrapper.addEventListener('click', () => {
            avatarInput.click();
        });

        avatarInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const formData = new FormData();
            formData.append('avatar', file);

            try {
                const res = await fetch('/api/upload-avatar', {
                    method: 'POST',
                    body: formData
                });
                const data = await res.json();
                if (data.success) {
                    profileUserData.avatar_url = data.avatar_url;
                    renderUserData();
                } else {
                    alert('שגיאה בהעלאת התמונה: ' + (data.error || 'שגיאה לא ידועה'));
                }
            } catch (err) {
                console.error('Upload error', err);
                alert('שגיאה בחיבור לשרת');
            }
        });

        function toggleAccordion(id) {
            const content = document.getElementById(id);
            const isCurrentlyExpanded = content.classList.contains('expanded');

            document.querySelectorAll('.accordion-content').forEach(el => {
                el.classList.remove('expanded');
            });

            if (!isCurrentlyExpanded) {
                content.classList.add('expanded');
            }
        }

        async function saveUsername() {
            const newName = document.getElementById('usernameInput').value.trim();

            if (!newName) {
                showToast('יש להזין שם משתמש', "error");
                return;
            }

            try {
                const res = await fetch('/api/profile', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name: newName })
                });
                const data = await res.json();
                if (data.success) {
                    showToast('שם המשתמש עודכן בהצלחה', "success");
                    profileUserData.name = newName;
                    renderUserData();
                } else {
                    showToast(data.error || 'שגיאה בעדכון', "error");
                }
            } catch (err) {
                showToast('שגיאה בחיבור לשרת', "error");
            }
        }

        async function savePhone() {
            const phone = document.getElementById('phoneInput').value.trim();

            if (!phone) {
                showToast(typeof i18n === 'function' ? i18n('profile_phone_required') : 'יש להזין מספר טלפון', "error");
                return;
            }

            try {
                const res = await fetch('/api/profile', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone: phone })
                });
                const data = await res.json();
                if (data.success) {
                    showToast(typeof i18n === 'function' ? i18n('profile_phone_saved') : 'הטלפון עודכן בהצלחה', "success");
                    profileUserData.phone = phone;
                    renderUserData();
                } else {
                    showToast(data.error || 'שגיאה בעדכון', "error");
                }
            } catch (err) {
                showToast('שגיאה בחיבור לשרת', "error");
            }
        }

        async function saveLanguage() {
            const lang = document.getElementById('languageSelect').value;

            try {
                const res = await fetch('/api/profile', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ language: lang })
                });
                const data = await res.json();
                if (data.success) {
                    showToast('השפה עודכנה בהצלחה, מרענן...', "success");
                    setTimeout(() => {
                        window.location.reload();
                    }, 1000);
                } else {
                    showToast(data.error || 'שגיאה בעדכון', "error");
                }
            } catch (err) {
                showToast('שגיאה בחיבור לשרת', "error");
            }
        }

        async function saveCurrency() {
            const currency = document.getElementById('currencySelect').value;

            try {
                const res = await fetch('/api/profile', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ default_currency: currency })
                });
                const data = await res.json();
                if (data.success) {
                    showToast('המטבע עודכן בהצלחה', "success");
                } else {
                    showToast(data.error || 'שגיאה בעדכון', "error");
                }
            } catch (err) {
                showToast('שגיאה בחיבור לשרת', "error");
            }
        }

        async function verifyPassword() {
            const currentPassword = document.getElementById('currentPassword').value;

            if (!currentPassword) {
                showToast('יש להזין סיסמה נוכחית', "error");
                return;
            }

            try {
                const res = await fetch('/api/verify-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ current_password: currentPassword })
                });
                const data = await res.json();
                if (data.success) {
                    
                    document.getElementById('step1Password').classList.add('hidden');
                    document.getElementById('step2Password').classList.remove('hidden');
                } else {
                    showToast(data.error || 'סיסמה שגויה', "error");
                }
            } catch (err) {
                showToast('שגיאה בחיבור לשרת', "error");
            }
        }

        async function changePassword() {
            const currentPassword = document.getElementById('currentPassword').value;
            const newPassword = document.getElementById('newPassword').value;
            const confirmPass = document.getElementById('confirmNewPassword').value;

            if (!newPassword || !confirmPass) {
                showToast('יש למלא את כל השדות', "error");
                return;
            }

            if (newPassword !== confirmPass) {
                showToast('הסיסמאות אינן תואמות', "error");
                return;
            }

            try {
                const res = await fetch('/api/profile/change-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ current_password: currentPassword, new_password: newPassword })
                });
                const data = await res.json();
                if (data.success) {
                    showToast('הסיסמה שונתה בהצלחה', "success");

                    setTimeout(() => {
                        document.getElementById('currentPassword').value = '';
                        document.getElementById('newPassword').value = '';
                        document.getElementById('confirmNewPassword').value = '';
                        document.getElementById('step2Password').classList.add('hidden');
                        document.getElementById('step1Password').classList.remove('hidden');
                        
                        toggleAccordion('passwordAcc');
                    }, 2000);
                } else {
                    showToast(data.error || 'שגיאה בעדכון הסיסמה', "error");
                }
            } catch (err) {
                showToast('שגיאה בחיבור לשרת', "error");
            }
        }
    </script>
</body>

</html>
