<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MasterSplitter 🐢</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

    <div class="app-container">
        
        <div class="app-header">
            <h1>MasterSplitter 🐢</h1>
            <div style="display: flex; align-items: center;">
                <select id="trip-selector" class="trip-select" onchange="loadTripData()"></select>
                <button class="logout-btn" onclick="logout()" title="התנתק">⎋</button>
            </div>
        </div>
        
        <div id="toast" class="toast-msg">הפעולה בוצעה בהצלחה!</div>

        <div class="app-content">
            
            <div id="screen-home" class="screen active">
                <div class="card">
                    <h3>תקציב הטיול</h3>
                    <div class="budget-circle">
                        <span class="budget-label">הוצאנו</span>
                        <span class="budget-amount" id="total-spent">₪0</span>
                    </div>
                    <div class="budget-stats">
                        <div class="stat-box">
                            <span class="budget-label">תקציב</span><br>
                            <strong style="color: var(--text-main);" id="total-budget">₪0</strong>
                        </div>
                        <div class="stat-box">
                            <span class="budget-label">נותר</span><br>
                            <strong style="color: var(--primary);" id="budget-left">₪0</strong>
                        </div>
                    </div>
                </div>
            </div>

            <div id="screen-expenses" class="screen">
                <div class="card">
                    <h3>רשימת הוצאות</h3>
                    <div id="expenses-list">
                        <div style="text-align: center; padding: 20px; color: var(--text-sec); font-weight: bold;">טוען הוצאות...</div>
                    </div>
                </div>
            </div>

            <div id="screen-add" class="screen">
                <div class="card">
                    <h3>הוספת הוצאה</h3>
                    
                    <label>מי שילם?</label>
                    <select id="payer">
                        <option value="Avi">אבי</option>
                        <option value="Alon">אלון</option>
                        <option value="Shlomi">שלומי</option>
                        <option value="Yonatan">יונתן</option>
                    </select>

                    <label>על מה היה?</label>
                    <input type="text" id="desc" placeholder="למשל: פיצה, מונית...">

                    <label>סכום (₪)</label>
                    <input type="number" id="amount" placeholder="0" min="0" step="0.01">

                    <label>קטגוריה</label>
                    <select id="category">
                        <option value="אוכל">🍕 אוכל</option>
                        <option value="לינה">🛏️ לינה</option>
                        <option value="תחבורה">🚕 תחבורה</option>
                        <option value="אטרקציות">🎟️ אטרקציות</option>
                        <option value="כללי" selected>💡 כללי</option>
                    </select>

                    <label>עבור מי?</label>
                    <div class="checkbox-grid" id="participants-container">
                        <label class="checkbox-label"><input type="checkbox" value="Avi" checked> אבי</label>
                        <label class="checkbox-label"><input type="checkbox" value="Alon" checked> אלון</label>
                        <label class="checkbox-label"><input type="checkbox" value="Shlomi" checked> שלומי</label>
                        <label class="checkbox-label"><input type="checkbox" value="Yonatan" checked> יונתן</label>
                    </div>

                    <button class="primary-btn" onclick="addExpense()">שמור הוצאה</button>
                </div>
            </div>

            <div id="screen-balances" class="screen">
                <div class="card">
                    <h3>מי חייב למי?</h3>
                    <div id="balances-list">
                    </div>
                </div>
            </div>
            
            <div id="screen-more" class="screen">
                <div class="card">
                    <h3>עוד אפשרויות</h3>
                    <p style="text-align: center; color: var(--text-sec); font-weight: bold; margin-top: 20px;">
                        מסך הגדרות ופרופיל יתווסף בהמשך.
                    </p>
                </div>
            </div>

        </div>

        <div class="bottom-nav">
            <button class="nav-item active" onclick="switchTab('home')" id="tab-home">
                <span class="nav-icon">🏠</span>
                <span>בית</span>
            </button>
            <button class="nav-item" onclick="switchTab('expenses')" id="tab-expenses">
                <span class="nav-icon">🧾</span>
                <span>הוצאות</span>
            </button>
            <div class="nav-add-btn-wrapper">
                <button class="nav-add-btn" onclick="switchTab('add')" id="tab-add">
                    +
                </button>
            </div>
            <button class="nav-item" onclick="switchTab('balances')" id="tab-balances">
                <span class="nav-icon">📊</span>
                <span>דוחות</span>
            </button>
            <button class="nav-item" onclick="switchTab('more')" id="tab-more">
                <span class="nav-icon">⚙️</span>
                <span>עוד</span>
            </button>
        </div>

    </div>

    <script src="/static/js/main.js"></script>
</body>
</html>
