        import React, { useState, useEffect } from 'react';

        const DynamicBackground = ({ isDark }) => {
            const darkCanvasRef = React.useRef(null);
            const lightCanvasRef = React.useRef(null);

            // Dark mode (stars)
            React.useEffect(() => {
                if (!isDark) return;
                const canvas = darkCanvasRef.current;
                if (!canvas) return;
                const ctx = canvas.getContext('2d');
                let animationFrameId;

                const resize = () => {
                    canvas.width = window.innerWidth;
                    canvas.height = window.innerHeight;
                };
                window.addEventListener('resize', resize);
                resize();

                const numStars = 150;
                const stars = Array.from({ length: numStars }).map(() => ({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    radius: Math.random() * 1.5,
                    speed: Math.random() * 0.5 + 0.1
                }));

                const draw = () => {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    ctx.fillStyle = 'white';
                    stars.forEach(star => {
                        ctx.globalAlpha = Math.random() * 0.5 + 0.5;
                        ctx.beginPath();
                        ctx.arc(star.x, star.y, star.radius, 0, Math.PI * 2);
                        ctx.fill();
                        star.y -= star.speed;
                        if (star.y < 0) {
                            star.y = canvas.height;
                            star.x = Math.random() * canvas.width;
                        }
                    });
                    animationFrameId = requestAnimationFrame(draw);
                };
                draw();

                return () => {
                    window.removeEventListener('resize', resize);
                    cancelAnimationFrame(animationFrameId);
                };
            }, [isDark]);

            // Light mode (doodles)
            React.useEffect(() => {
                if (isDark) return;
                const canvas = lightCanvasRef.current;
                if (!canvas) return;
                const ctx = canvas.getContext('2d');
                let animationFrameId;

                const resize = () => {
                    canvas.width = window.innerWidth;
                    canvas.height = window.innerHeight;
                };
                window.addEventListener('resize', resize);
                resize();

                const itemsList = ["E=mc²", "🍕", "∑", "x²+y²", "👓", "Δx", "{ }", "y=mx+b", "∫", "π", "±"];
                const numItems = 40;
                const items = Array.from({ length: numItems }).map(() => ({
                    text: itemsList[Math.floor(Math.random() * itemsList.length)],
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    speed: Math.random() * 0.3 + 0.1,
                    fontSize: Math.random() * 20 + 20, // 20px to 40px
                    rotation: (Math.random() - 0.5) * Math.PI / 2 // -45 to 45 deg
                }));

                const draw = () => {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    ctx.fillStyle = '#64748b'; // slate-500
                    ctx.globalAlpha = 0.08; // very low opacity (8%)
                    ctx.textAlign = "center";
                    ctx.textBaseline = "middle";
                    
                    items.forEach(item => {
                        ctx.save();
                        ctx.font = `bold ${item.fontSize}px monospace, sans-serif`;
                        ctx.translate(item.x, item.y);
                        ctx.rotate(item.rotation);
                        ctx.fillText(item.text, 0, 0);
                        ctx.restore();
                        
                        item.y -= item.speed;
                        if (item.y < -50) {
                            item.y = canvas.height + 50;
                            item.x = Math.random() * canvas.width;
                        }
                    });
                    animationFrameId = requestAnimationFrame(draw);
                };
                draw();

                return () => {
                    window.removeEventListener('resize', resize);
                    cancelAnimationFrame(animationFrameId);
                };
            }, [isDark]);

            return (
                <div className="fixed inset-0 overflow-hidden pointer-events-none transition-colors duration-500 bg-[#f8fafc] dark:bg-[#0f172a] -z-10">
                    <canvas 
                        ref={darkCanvasRef} 
                        className={`absolute inset-0 transition-opacity duration-700 ${isDark ? 'opacity-100' : 'opacity-0'}`} 
                    />
                    <canvas 
                        ref={lightCanvasRef} 
                        className={`absolute inset-0 transition-opacity duration-700 ${!isDark ? 'opacity-100' : 'opacity-0'}`} 
                    />
                </div>
            );
        };

        const LegalModal = ({ data, onClose }) => {
            if (!data) return null;
            return (
                <div className="fixed inset-0 z-[200] flex items-center justify-center bg-black/50 backdrop-blur-sm p-4" onClick={onClose} role="dialog" aria-modal="true" aria-labelledby="modal-title">
                    <div className="bg-white dark:bg-slate-800 rounded-2xl max-w-lg w-full max-h-[85vh] overflow-hidden shadow-2xl flex flex-col" onClick={e => e.stopPropagation()}>
                        <div className="flex justify-between items-center p-4 border-b border-gray-200 dark:border-slate-700 bg-white dark:bg-slate-800">
                            <h3 id="modal-title" className="font-bold text-lg text-gray-900 dark:text-white" dir="rtl">{data.title}</h3>
                            <button onClick={onClose} aria-label="Close modal" className="text-gray-500 hover:text-gray-800 dark:text-gray-400 dark:hover:text-white focus:outline-none p-1 rounded-md hover:bg-gray-100 dark:hover:bg-slate-700 transition-colors">
                                <X size={20} />
                            </button>
                        </div>
                        <div className="p-6 overflow-y-auto text-sm text-gray-600 dark:text-gray-300 space-y-2 leading-relaxed" dir="rtl" dangerouslySetInnerHTML={{ __html: data.content }}></div>
                    </div>
                </div>
            );
        };

        const ProfileApp = () => {
            const [lang, setLang] = useState(i18n ? i18n.getCurrentLanguage() : 'he');
            const [isDark, setIsDark] = useState(document.documentElement.classList.contains('dark'));
            const [activeModal, setActiveModal] = useState(null);
            
            const [legalData, setLegalData] = useState(null);
            const [profileData, setProfileData] = useState({
                id: null,
                name: '',
                email: '',
                phone: '',
                avatar_url: '',
                language: 'he',
                default_currency: 'ILS',
                is_google_auth: false,
                two_fa_method: 'none',
                notify_expense_added: 1,
                notify_group_expense: 1
            });

            const [formData, setFormData] = useState({});
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState('');
            const [success, setSuccess] = useState('');

            useEffect(() => {
                fetchProfile();
            }, []);

            const fetchProfile = async () => {
                try {
                    const res = await fetch('/api/profile');
                    const data = await res.json();
                    if (res.ok) {
                        setProfileData(data);
                        setFormData(data);
                    }
                } catch(e) {
                    console.error("Failed to load profile", e);
                } finally {
                    setLoading(false);
                }
            };

            const toggleTheme = () => {
                const newDark = !isDark;
                setIsDark(newDark);
                const theme = newDark ? 'dark' : 'light';
                localStorage.setItem('theme', theme);
                if (newDark) {
                    document.documentElement.classList.add('dark');
                    document.documentElement.classList.remove('light');
                } else {
                    document.documentElement.classList.add('light');
                    document.documentElement.classList.remove('dark');
                }
            };

            const t = (key) => i18n ? i18n.getTranslation(key) : key;
            const isRTL = i18n ? i18n.getDirection() === 'rtl' : true;
            const Chevron = isRTL ? ChevronLeft : ChevronRight;

            const handleUpdateProfile = async (field, value, endpoint='/api/profile', method='PUT') => {
                setError('');
                setSuccess('');
                try {
                    const payload = field ? { [field]: value } : formData;
                    const res = await fetch(endpoint, {
                        method,
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    const data = await res.json();
                    if (res.ok) {
                        setSuccess(t('profileSuccess'));
                        if (field) {
                            setProfileData(prev => ({ ...prev, [field]: value }));
                        } else {
                            fetchProfile();
                        }
                        setTimeout(() => setActiveModal(null), 1500);
                    } else {
                        setError(data.error || 'Error');
                    }
                } catch (e) {
                    setError('Network Error');
                }
            };

            const handleAvatarUpload = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const fd = new FormData();
                fd.append('avatar', file);
                try {
                    const res = await fetch('/api/upload-avatar', { method: 'POST', body: fd });
                    const data = await res.json();
                    if (res.ok) {
                        setProfileData(prev => ({ ...prev, avatar_url: data.avatar_url }));
                        setActiveModal(null);
                    } else {
                        setError(data.error);
                    }
                } catch (err) {
                    setError('Network Error');
                }
            };

            const openModal = (name) => {
                setError('');
                setSuccess('');
                setActiveModal(name);
            };

            const renderMenuItem = (icon, text, onClick, rightContent = null) => (
                <button 
                    onClick={onClick}
                    className="w-full flex items-center justify-between p-4 hover:bg-gray-50 dark:hover:bg-slate-800/50 transition-colors first:rounded-t-2xl last:rounded-b-2xl border-b last:border-b-0 border-gray-100 dark:border-gray-800"
                >
                    <div className="flex items-center gap-3">
                        <div className="text-purple-500 dark:text-purple-400">{icon}</div>
                        <span className="font-medium text-gray-700 dark:text-gray-200">{text}</span>
                    </div>
                    <div className="flex items-center gap-2 text-gray-400">
                        {rightContent}
                        <Chevron size={18} />
                    </div>
                </button>
            );

            if (loading) return <div className="text-center text-white">{t('loadingThinking')}</div>;

            return (
                <div className="bg-transparent dark:bg-transparent min-h-screen relative z-10 p-4 w-full flex justify-center items-center font-sans" dir={isRTL ? 'rtl' : 'ltr'}>

                                {profileData.avatar_url ? (
                                    <img src={profileData.avatar_url} className="w-full h-full object-cover" />

                                )}
                            </div>
                            <div className="absolute inset-0 bg-black/40 rounded-full opacity-0 group-hover:opacity-100 flex items-center justify-center transition-opacity">
                                <Camera className="text-white" size={24} />
                            </div>

                        {/* Account */}
                        <div>
                            <h3 className="text-xs font-bold uppercase tracking-wider text-gray-400 dark:text-gray-500 mb-2 px-4">{t('profileAccount')}</h3>
                            <div className="bg-white dark:bg-slate-900 rounded-2xl border border-gray-100 dark:border-gray-800 shadow-sm">
                                {renderMenuItem(<User size={20}/>, t('profileChangeName'), () => openModal('name'), <span className="text-sm truncate max-w-[100px]">{profileData.name}</span>)}
                                {renderMenuItem(<ImageIcon size={20}/>, t('profileChangeAvatar'), () => openModal('avatar'))}

                                {renderMenuItem(<Phone size={20}/>, t('profileUpdatePhone'), () => openModal('phone'), <span className="text-sm truncate max-w-[100px]">{profileData.phone}</span>)}

                            <div className="bg-white dark:bg-slate-900 rounded-2xl border border-gray-100 dark:border-gray-800 shadow-sm">
                                <div className="w-full flex items-center justify-between p-4 hover:bg-gray-50 dark:hover:bg-slate-800/50 transition-colors first:rounded-t-2xl border-b border-gray-100 dark:border-gray-800">
                                    <div className="flex items-center gap-3">
                                        <div className="text-purple-500 dark:text-purple-400"><Globe size={20}/></div>
                                        <span className="font-medium text-gray-700 dark:text-gray-200">{t('profileLanguage')}</span>
                                    </div>
                                    <select 
                                        value={lang} 
                                        onChange={(e) => {
                                            const code = e.target.value;
                                            if (i18n) i18n.changeLanguage(code);
                                            setLang(code);
                                            localStorage.setItem('lang', code);
                                            handleUpdateProfile('language', code);

                                        aria-label={t('profileLanguage')}
                                        dir={isRTL ? 'rtl' : 'ltr'}
                                    >
                                        {Object.entries(languageNames).map(([code, name]) => (
                                            <option key={code} value={code} className="bg-white dark:bg-slate-800 text-gray-900 dark:text-white">{name}</option>
                                        ))}
                                    </select>
                                </div>
                                {renderMenuItem(<DollarSign size={20}/>, t('profileCurrency'), () => openModal('currency'), <span className="text-sm">{profileData.default_currency}</span>)}
                                <button onClick={toggleTheme} className="w-full flex items-center justify-between p-4 hover:bg-gray-50 dark:hover:bg-slate-800/50 transition-colors border-b last:border-b-0 border-gray-100 dark:border-gray-800">
                                    <div className="flex items-center gap-3">
                                        <div className="text-purple-500 dark:text-purple-400">{isDark ? <Moon size={20}/> : <Sun size={20}/>}</div>
                                        <span className="font-medium text-gray-700 dark:text-gray-200">{t('profileTheme')}</span>
                                    </div>
                                    <div className="w-11 h-6 bg-purple-500 rounded-full relative transition-colors">
                                        <div className={`absolute top-1 w-4 h-4 bg-white rounded-full transition-transform ${isDark ? (isRTL ? 'left-1' : 'right-1') : (isRTL ? 'right-1' : 'left-1')}`}></div>
                                    </div>
                                </button>
                                {renderMenuItem(<Bell size={20}/>, t('profileNotifications'), () => openModal('notifications'))}
                            </div>
                        </div>

                        {/* Support */}
                        <div>
                            <h3 className="text-xs font-bold uppercase tracking-wider text-gray-400 dark:text-gray-500 mb-2 px-4">{t('profileSupport')}</h3>
                            <div className="bg-white dark:bg-slate-900 rounded-2xl border border-gray-100 dark:border-gray-800 shadow-sm">
                                {renderMenuItem(<HelpCircle size={20}/>, t('profileGuide'), () => openModal('comingSoon'))}
                                {renderMenuItem(<MessageSquare size={20}/>, t('profileFeedback'), () => openModal('feedback'))}
                                {renderMenuItem(<Phone size={20}/>, t('profileContact'), () => openModal('contact'))}
                            </div>
                        </div>

                        {/* Privacy & Security */}
                        <div>
                            <h3 className="text-xs font-bold uppercase tracking-wider text-gray-400 dark:text-gray-500 mb-2 px-4">{t('profilePrivacySecurity')}</h3>
                            <div className="bg-white dark:bg-slate-900 rounded-2xl border border-gray-100 dark:border-gray-800 shadow-sm">
                                {renderMenuItem(<Shield size={20}/>, t('profilePrivacySettings'), () => openModal('comingSoon'))}
                                <button onClick={() => setLegalData(LEGAL_TEXTS.terms)} className="w-full flex items-center justify-between p-4 hover:bg-gray-50 dark:hover:bg-slate-800/50 transition-colors border-b border-gray-100 dark:border-gray-800 focus:outline-none focus:ring-2 focus:ring-purple-500">
                                    <div className="flex items-center gap-3">
                                        <div className="text-purple-500 dark:text-purple-400"><BookOpen size={20}/></div>
                                        <span className="font-medium text-gray-700 dark:text-gray-200 hover:underline focus:underline">{t('termsOfUse')}</span>
                                    </div>
                                    <div className="flex items-center gap-2 text-gray-400"><Chevron size={18} /></div>
                                </button>
                                <button onClick={() => setLegalData(LEGAL_TEXTS.privacy)} className="w-full flex items-center justify-between p-4 hover:bg-gray-50 dark:hover:bg-slate-800/50 transition-colors border-b border-gray-100 dark:border-gray-800 focus:outline-none focus:ring-2 focus:ring-purple-500">
                                    <div className="flex items-center gap-3">
                                        <div className="text-purple-500 dark:text-purple-400"><BookOpen size={20}/></div>
                                        <span className="font-medium text-gray-700 dark:text-gray-200 hover:underline focus:underline">{t('privacyPolicy')}</span>
                                    </div>
                                    <div className="flex items-center gap-2 text-gray-400"><Chevron size={18} /></div>
                                </button>
                                {renderMenuItem(<Fingerprint size={20}/>, t('profile2FA'), () => openModal('2fa'), <span className="text-sm capitalize">{profileData.two_fa_method}</span>)}
                            </div>
                        </div>

                    </div>
                </div>

                {/* Modals */}
                    
                    <Modal isOpen={activeModal === 'name'} onClose={() => setActiveModal(null)} title={t('profileChangeName')}>
                        <input type="text" className="w-full p-3 rounded-xl border border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-slate-800 text-gray-900 dark:text-white mb-4 focus:outline-none focus:ring-2 focus:ring-purple-500" 
                            value={formData.name || ''} onChange={e => setFormData({...formData, name: e.target.value})} />
                        {error && <p className="text-red-500 text-sm mb-4">{error}</p>}
                        {success && <p className="text-green-500 text-sm mb-4">{success}</p>}
                        <button onClick={() => handleUpdateProfile('name', formData.name)} className="w-full p-3 bg-purple-600 hover:bg-purple-700 text-white rounded-xl font-bold focus:outline-none focus:ring-2 focus:ring-purple-500 transition-colors">{t('profileSave')}</button>
                    </Modal>

                    <Modal isOpen={activeModal === 'avatar'} onClose={() => setActiveModal(null)} title={t('profileChangeAvatar')}>
                        <input type="file" accept="image/*" onChange={handleAvatarUpload} className="w-full p-3 text-gray-900 dark:text-white" />
                        {error && <p className="text-red-500 text-sm mt-4">{error}</p>}
                    </Modal>

                    <Modal isOpen={activeModal === 'email'} onClose={() => setActiveModal(null)} title={t('profileUpdateEmail')}>
                        {profileData.is_google_auth ? (
                            <div className="text-center py-6">
                                <Globe size={48} className="mx-auto text-blue-500 mb-4" />
                                <h4 className="font-bold text-gray-900 dark:text-white mb-2">{t('profileGoogleManaged')}</h4>
                                <p className="text-gray-500 dark:text-gray-400 text-sm">{t('profileGoogleManagedDesc')}</p>
                            </div>
                        ) : (
                            <div>
                                <input type="email" className="w-full p-3 rounded-xl border border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-slate-800 text-gray-900 dark:text-white mb-4 focus:outline-none focus:ring-2 focus:ring-purple-500" 
                                    value={formData.email || ''} onChange={e => setFormData({...formData, email: e.target.value})} />
                                {error && <p className="text-red-500 text-sm mb-4">{error}</p>}
                                {success && <p className="text-green-500 text-sm mb-4">{success}</p>}
                                <button onClick={() => handleUpdateProfile('email', formData.email)} className="w-full p-3 bg-purple-600 hover:bg-purple-700 text-white rounded-xl font-bold focus:outline-none focus:ring-2 focus:ring-purple-500 transition-colors">{t('profileSave')}</button>
                            </div>
                        )}
                    </Modal>

                    <Modal isOpen={activeModal === 'phone'} onClose={() => setActiveModal(null)} title={t('profileUpdatePhone')}>
                        <input type="tel" className="w-full p-3 rounded-xl border border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-slate-800 text-gray-900 dark:text-white mb-4 focus:outline-none focus:ring-2 focus:ring-purple-500" 
                            value={formData.phone || ''} onChange={e => setFormData({...formData, phone: e.target.value})} />
                        {error && <p className="text-red-500 text-sm mb-4">{error}</p>}
                        {success && <p className="text-green-500 text-sm mb-4">{success}</p>}
                        <button onClick={() => handleUpdateProfile('phone', formData.phone)} className="w-full p-3 bg-purple-600 hover:bg-purple-700 text-white rounded-xl font-bold focus:outline-none focus:ring-2 focus:ring-purple-500 transition-colors">{t('profileSave')}</button>
                    </Modal>

                    
                    <Modal isOpen={activeModal === 'password'} onClose={() => { setActiveModal(null); setFormData({...formData, passwordStep: 1}); }} title={t('profileChangePassword')}>
                        {(!formData.passwordStep || formData.passwordStep === 1) ? (
                            <div>
                                <input type="password" placeholder={t('profileCurrentPassword')} className="w-full p-3 rounded-xl border border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-slate-800 text-gray-900 dark:text-white mb-3 focus:outline-none focus:ring-2 focus:ring-purple-500 focus:outline-none focus:ring-2 focus:ring-purple-500" 
                                    onChange={e => setFormData({...formData, current_password: e.target.value})} />
                                {error && <p className="text-red-500 text-sm mb-4">{error}</p>}
                                <button onClick={async () => {
                                    setError('');
                                    try {
                                        const res = await fetch('/api/verify-password', {
                                            method: 'POST',
                                            headers: { 'Content-Type': 'application/json' },
                                            body: JSON.stringify({ current_password: formData.current_password })
                                        });
                                        if (res.ok) {
                                            setFormData({...formData, passwordStep: 2});
                                        } else {
                                            setError(t('invalidCurrentPassword') || 'Invalid password');
                                        }
                                    } catch(e) {
                                        setError('Network Error');
                                    }
                                }} className="w-full p-3 bg-purple-600 text-white rounded-xl font-bold focus:outline-none focus:ring-2 focus:ring-purple-500">{t('verifyPassword') || 'Verify'}</button>
                            </div>
                        ) : (
                            <div>
                                <input type="password" placeholder={t('profileNewPassword')} className="w-full p-3 rounded-xl border border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-slate-800 text-gray-900 dark:text-white mb-3 focus:outline-none focus:ring-2 focus:ring-purple-500 focus:outline-none focus:ring-2 focus:ring-purple-500" 
                                    onChange={e => setFormData({...formData, new_password: e.target.value})} />
                                <input type="password" placeholder={t('verifyNewPassword') || 'Verify New Password'} className="w-full p-3 rounded-xl border border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-slate-800 text-gray-900 dark:text-white mb-4 focus:outline-none focus:ring-2 focus:ring-purple-500 focus:outline-none focus:ring-2 focus:ring-purple-500" 
                                    onChange={e => setFormData({...formData, confirm_new_password: e.target.value})} />
                                {error && <p className="text-red-500 text-sm mb-4">{error}</p>}
                                {success && <p className="text-green-500 text-sm mb-4">{success}</p>}
                                <button onClick={() => {
                                    if(formData.new_password !== formData.confirm_new_password) {
                                        setError(t('passwordsDoNotMatch') || 'Passwords do not match');
                                        return;
                                    }
                                    handleUpdateProfile(null, null, '/api/profile/change-password', 'POST');
                                }} className="w-full p-3 bg-purple-600 text-white rounded-xl font-bold focus:outline-none focus:ring-2 focus:ring-purple-500">{t('profileSave')}</button>
                            </div>
                        )}
                    </Modal>

                    <Modal isOpen={activeModal === 'notifications'} onClose={() => setActiveModal(null)} title={t('profileNotifications')}>
                        <div className="space-y-6 mt-4">
                            <div className="flex items-center justify-between">
                                <span className="text-gray-700 dark:text-gray-200 font-medium">{t('notifyExpenseAdded') || 'התראה על הוצאה שנוספה על שמי'}</span>
                                <button onClick={() => handleUpdateProfile('notify_expense_added', profileData.notify_expense_added ? 0 : 1)} className="relative inline-flex h-6 w-11 items-center rounded-full transition-colors focus:outline-none focus:ring-2 focus:ring-purple-500" style={{backgroundColor: profileData.notify_expense_added ? '#a855f7' : '#cbd5e1'}}>
                                    <span className={`inline-block h-4 w-4 transform rounded-full bg-white transition ${profileData.notify_expense_added ? (isRTL ? '-translate-x-6' : 'translate-x-6') : (isRTL ? '-translate-x-1' : 'translate-x-1')}`} />
                                </button>
                            </div>
                            <div className="flex items-center justify-between">
                                <span className="text-gray-700 dark:text-gray-200 font-medium">{t('notifyGroupExpense') || 'התראה על הוצאה שנוספה בקבוצה שלי'}</span>
                                <button onClick={() => handleUpdateProfile('notify_group_expense', profileData.notify_group_expense ? 0 : 1)} className="relative inline-flex h-6 w-11 items-center rounded-full transition-colors focus:outline-none focus:ring-2 focus:ring-purple-500" style={{backgroundColor: profileData.notify_group_expense ? '#a855f7' : '#cbd5e1'}}>
                                    <span className={`inline-block h-4 w-4 transform rounded-full bg-white transition ${profileData.notify_group_expense ? (isRTL ? '-translate-x-6' : 'translate-x-6') : (isRTL ? '-translate-x-1' : 'translate-x-1')}`} />
                                </button>
                            </div>
                        </div>
                    </Modal>

                    <Modal isOpen={activeModal === 'currency'} onClose={() => setActiveModal(null)} title={t('profileCurrency')}>
                        <div className="grid grid-cols-3 gap-2">
                            {['ILS (₪)', 'USD ($)', 'EUR (€)', 'GBP (£)', 'THB (฿)', 'JPY (¥)', 'CAD ($)', 'AUD ($)', 'CHF'].map(curr => {
                                const code = curr.split(' ')[0];
                                return (
                                <button key={code} onClick={() => handleUpdateProfile('default_currency', code)} className={`p-3 rounded-xl border transition-colors text-sm font-semibold ${profileData.default_currency === code ? 'border-purple-500 bg-purple-50 dark:bg-purple-900/20 text-purple-600 dark:text-purple-400' : 'border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-slate-800 text-gray-900 dark:text-white'}`}>
                                    {curr}
                                </button>
                            )})}
                        </div>
                    </Modal>

                    <Modal isOpen={activeModal === 'feedback'} onClose={() => setActiveModal(null)} title={t('profileFeedback')}>
                        <textarea className="w-full p-3 rounded-xl border border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-slate-800 text-gray-900 dark:text-white mb-4 focus:outline-none focus:ring-2 focus:ring-purple-500 h-32 resize-none" 
                            placeholder={t('profileMessage')} onChange={e => setFormData({...formData, feedback: e.target.value})}></textarea>
                        {error && <p className="text-red-500 text-sm mb-4">{error}</p>}
                        {success && <p className="text-green-500 text-sm mb-4">{success}</p>}
                        <button onClick={() => handleUpdateProfile(null, null, '/api/feedback', 'POST')} className="w-full p-3 bg-purple-600 hover:bg-purple-700 text-white rounded-xl font-bold transition-colors flex items-center justify-center gap-2">
                            <Send size={16} />{t('profileSend')}
                        </button>
                    </Modal>

                    <Modal isOpen={activeModal === 'contact'} onClose={() => setActiveModal(null)} title={t('profileContact')}>
                        <input type="text" placeholder={t('profileSubject')} className="w-full p-3 rounded-xl border border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-slate-800 text-gray-900 dark:text-white mb-3 focus:outline-none focus:ring-2 focus:ring-purple-500" 
                            onChange={e => setFormData({...formData, subject: e.target.value})} />
                        <textarea className="w-full p-3 rounded-xl border border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-slate-800 text-gray-900 dark:text-white mb-4 focus:outline-none focus:ring-2 focus:ring-purple-500 h-32 resize-none" 
                            placeholder={t('profileMessage')} onChange={e => setFormData({...formData, message: e.target.value})}></textarea>
                        {error && <p className="text-red-500 text-sm mb-4">{error}</p>}
                        {success && <p className="text-green-500 text-sm mb-4">{success}</p>}
                        <button onClick={() => handleUpdateProfile(null, null, '/api/contact', 'POST')} className="w-full p-3 bg-purple-600 hover:bg-purple-700 text-white rounded-xl font-bold transition-colors flex items-center justify-center gap-2">
                            <Send size={16} />{t('profileSend')}
                        </button>
                    </Modal>

                    <Modal isOpen={activeModal === '2fa'} onClose={() => setActiveModal(null)} title={t('profile2FA')}>
                        <div className="space-y-3">
                            <button onClick={() => handleUpdateProfile('two_fa_method', 'none')} className={`w-full p-4 rounded-xl border transition-colors flex items-center gap-3 ${profileData.two_fa_method === 'none' ? 'border-purple-500 bg-purple-50 dark:bg-purple-900/20' : 'border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-slate-800'}`}>
                                <Shield size={20} className={profileData.two_fa_method === 'none' ? 'text-purple-500' : 'text-gray-400'} />
                                <div className="text-right flex-1">
                                    <div className={`font-semibold ${profileData.two_fa_method === 'none' ? 'text-purple-600 dark:text-purple-400' : 'text-gray-900 dark:text-white'}`}>Off</div>
                                    <div className="text-xs text-gray-500">{isRTL ? 'ללא אימות נוסף' : 'No additional verification'}</div>
                                </div>
                            </button>
                            <button onClick={() => handleUpdateProfile('two_fa_method', 'email')} className={`w-full p-4 rounded-xl border transition-colors flex items-center gap-3 ${profileData.two_fa_method === 'email' ? 'border-purple-500 bg-purple-50 dark:bg-purple-900/20' : 'border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-slate-800'}`}>
                                <Mail size={20} className={profileData.two_fa_method === 'email' ? 'text-purple-500' : 'text-gray-400'} />
                                <div className="text-right flex-1">
                                    <div className={`font-semibold ${profileData.two_fa_method === 'email' ? 'text-purple-600 dark:text-purple-400' : 'text-gray-900 dark:text-white'}`}>Email</div>
                                    <div className="text-xs text-gray-500">{isRTL ? 'קוד אימות לאימייל' : 'Verification code via email'}</div>
                                </div>
                            </button>
                            <button onClick={() => handleUpdateProfile('two_fa_method', 'fingerprint')} className={`w-full p-4 rounded-xl border transition-colors flex items-center gap-3 ${profileData.two_fa_method === 'fingerprint' ? 'border-purple-500 bg-purple-50 dark:bg-purple-900/20' : 'border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-slate-800'}`}>
                                <Fingerprint size={20} className={profileData.two_fa_method === 'fingerprint' ? 'text-purple-500' : 'text-gray-400'} />
                                <div className="text-right flex-1">
                                    <div className={`font-semibold ${profileData.two_fa_method === 'fingerprint' ? 'text-purple-600 dark:text-purple-400' : 'text-gray-900 dark:text-white'}`}>Fingerprint / WebAuthn</div>
                                    <div className="text-xs text-gray-500">{isRTL ? 'אימות ביומטרי' : 'Biometric authentication'}</div>
                                </div>
                            </button>
                        </div>
                    </Modal>

                    <Modal isOpen={activeModal === 'comingSoon'} onClose={() => setActiveModal(null)} title="">
                        <div className="text-center py-6">
                            <Shield size={48} className="mx-auto text-purple-500 mb-4" />
                            <h4 className="font-bold text-gray-900 dark:text-white mb-2">{t('profileComingSoon')}</h4>
                        </div>
                    </Modal>

                    <LegalModal data={legalData} onClose={() => setLegalData(null)} />
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<ProfileApp />);
    {% endraw %}
</script>
</body>
</html>
