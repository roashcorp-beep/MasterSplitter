<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="MasterSplitter — אפליקציה לחלוקת הוצאות בטיולים עם חברים. עקבו אחרי מי שילם, חשבו יתרות, וסגרו חשבונות בקלות.">
    <title>MasterSplitter - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="login-body">
    <div class="login-page-wrapper">

        <!-- Language Switcher -->
        <div class="login-lang-switcher">
            <select id="login-lang-select" onchange="switchLoginLanguage(this.value)">
                <option value="he" selected>עברית</option>
                <option value="en">English</option>
            </select>
            <span class="lang-label">Language / שפה</span>
        </div>

        <!-- Floating brand area -->
        <div class="login-brand">
            <h1 class="brand-title">
                <span class="purple-text" data-i18n="brand_master">MASTER</span>
                <span class="dark-text" data-i18n="brand_splitter">SPLITTER</span>
            </h1>
        </div>

        <!-- Glass floating card -->
        <div class="login-card">
            <h2 class="welcome-text" id="welcome-title" data-i18n="login_welcome">ברוך הבא!</h2>
            <p class="welcome-sub" id="welcome-sub" data-i18n="login_sub">התחבר כדי לנהל את ההוצאות שלך</p>

            <!-- LOGIN / SIGNUP FORM -->
            <div id="auth-form">
                <div class="form-group">
                    <div class="floating-input-wrapper">
                        <span class="input-icon">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                        </span>
                        <input type="text" id="username" placeholder=" " required autocomplete="username">
                        <label for="username" data-i18n="login_username_email">שם משתמש או אימייל</label>
                    </div>
                </div>

                <div class="form-group">
                    <div class="floating-input-wrapper">
                        <span class="input-icon">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                        </span>
                        <input type="password" id="password" placeholder=" " required autocomplete="current-password">
                        <label for="password" data-i18n="login_password">סיסמה</label>
                    </div>
                </div>

                <div class="form-group signup-only" style="display: none;" id="email-group">
                    <div class="floating-input-wrapper">
                        <span class="input-icon">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
                        </span>
                        <input type="email" id="email" placeholder=" ">
                        <label for="email" data-i18n="login_email">אימייל</label>
                    </div>
                </div>

                <div class="form-group signup-only" style="display: none;" id="phone-group">
                    <div class="floating-input-wrapper">
                        <span class="input-icon">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="2" width="14" height="20" rx="2" ry="2"></rect><line x1="12" y1="18" x2="12.01" y2="18"></line></svg>
                        </span>
                        <input type="tel" id="phone" placeholder=" ">
                        <label for="phone" data-i18n="login_phone">מספר טלפון</label>
                    </div>
                </div>

                <button class="primary-btn full-width" id="submit-btn" onclick="submitAuth()" data-i18n="login_btn_login">התחבר</button>

                <div class="forgot-link-wrapper" id="forgot-link-wrapper">
                    <a href="#" class="forgot-pwd" onclick="showForgotForm(); return false;" data-i18n="login_forgot">שכחת סיסמה?</a>
                </div>

                <!-- Social Login Divider -->
                <div class="divider social-divider" data-i18n="login_social_divider">או התחבר באמצעות</div>

                <!-- Social Login Buttons -->
                <div class="social-login-row">
                    <button class="social-btn google-social-btn" onclick="window.location.href='/api/auth/google';" title="Google">
                        <svg viewBox="0 0 24 24" width="22" height="22">
                            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
                            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                        </svg>
                    </button>
                    <button class="social-btn facebook-social-btn" onclick="console.log('OAuth pending - Facebook'); alert('Facebook OAuth coming soon!');" title="Facebook">
                        <svg viewBox="0 0 24 24" width="22" height="22">
                            <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z" fill="#1877F2"/>
                        </svg>
                    </button>
                </div>

                <div class="divider" data-i18n="login_or">או</div>

                <button class="secondary-btn full-width" id="toggle-auth-btn" onclick="toggleAuthMode()" data-i18n="login_btn_signup">צור חשבון חדש</button>
            </div>

            <!-- FORGOT PASSWORD FORM (hidden by default) -->
            <div id="forgot-form" style="display: none;">
                <div class="form-group">
                    <div class="floating-input-wrapper">
                        <span class="input-icon">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
                        </span>
                        <input type="email" id="forgot-email" placeholder=" " required>
                        <label for="forgot-email" data-i18n="forgot_email">כתובת אימייל</label>
                    </div>
                </div>

                <button class="primary-btn full-width" onclick="submitForgotPassword()" data-i18n="forgot_btn">שלח קישור לאיפוס</button>

                <div style="text-align: center; margin-top: 16px;">
                    <a href="#" class="forgot-pwd" onclick="hideForgotForm(); return false;" data-i18n="forgot_back">← חזור להתחברות</a>
                </div>
            </div>

            <div class="error-message" id="error-msg"></div>
            <div class="success-message" id="success-msg"></div>
        </div>

    </div>
    
    <script src="/static/js/translations.js"></script>
    <script src="/static/js/main.js"></script>
    <script>
        // Login page language switcher
        function switchLoginLanguage(lang) {
            setLanguage(lang);
        }
        // Set dropdown to match current language on load
        document.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                const sel = document.getElementById('login-lang-select');
                if (sel && typeof currentLang !== 'undefined') {
                    sel.value = currentLang;
                }
            }, 300);

            // Show OAuth error messages from URL params
            const params = new URLSearchParams(window.location.search);
            const err = params.get('error');
            if (err) {
                const errorMap = {
                    'google_not_configured': 'Google login is not configured on this server.',
                    'google_access_denied': 'Google login was cancelled.',
                    'google_state_mismatch': 'Security validation failed. Please try again.',
                    'google_no_code': 'Google did not provide an authorization code.',
                    'google_token_failed': 'Failed to authenticate with Google. Please try again.',
                    'google_network_error': 'Network error while contacting Google. Please try again.',
                    'google_profile_failed': 'Failed to fetch your Google profile.',
                    'google_no_email': 'Your Google account does not have an email address.',
                    'google_db_error': 'A server error occurred. Please try again later.',
                };
                const errMsg = document.getElementById('error-msg');
                if (errMsg) {
                    errMsg.textContent = errorMap[err] || 'An error occurred during Google login.';
                    errMsg.classList.add('visible');
                }
                // Clean URL without reloading
                window.history.replaceState({}, document.title, '/');
            }

            // Show success message for verified accounts
            if (params.get('verified') === 'true') {
                const successMsg = document.getElementById('success-msg');
                if (successMsg) {
                    successMsg.textContent = 'Email verified! You can now log in.';
                    successMsg.classList.add('visible');
                }
                window.history.replaceState({}, document.title, '/');
            }
        });
    </script>
</body>
</html>
