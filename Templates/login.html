    <!-- OS Default Theme Script -->
    <script>
        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');

        const hashMatch = window.location.hash.match(/#join=([^&]+)/);
        if (hashMatch) {
            localStorage.setItem('pending_join_trip_id', hashMatch[1]);
        }

    <!-- Babel Standalone -->
    
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",

    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

            background-image: radial-gradient(circle at center, rgba(59, 130, 246, 0.05) 0%, rgba(248, 250, 252, 1) 100%), url("data:image/svg+xml,%3Csvg width='100' height='100' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23000000' fill-opacity='0.03' font-family='monospace' font-size='12'%3E%3Ctext x='10' y='20'%3E∑(x_i)%3C/text%3E%3Ctext x='50' y='60'%3Eπ*r²%3C/text%3E%3Ctext x='80' y='10'%3E+1%3C/text%3E%3Ctext x='20' y='90'%3EE=mc²%3C/text%3E%3Ctext x='70' y='80'%3E∫dx%3C/text%3E%3C/g%3E%3C/svg%3E");
        }

    <script>
        // Init theme and lang from localStorage BEFORE react to prevent flash
        (function() {
            try {
                const theme = localStorage.getItem('theme') || 'dark'; // default to dark
                if (theme === 'dark') {
                    document.documentElement.classList.add('dark');
                } else {
                    document.documentElement.classList.remove('dark');
                    document.documentElement.classList.add('light'); // for our custom math-bg selector
                }
                const lang = localStorage.getItem('lang') || 'he';
                document.documentElement.lang = lang;
                document.documentElement.dir = ['he', 'ar'].includes(lang) ? 'rtl' : 'ltr';

</head>
<body class="bg-gray-50 dark:bg-slate-900 font-sans text-gray-900 dark:text-gray-100 transition-colors duration-300">
    <!-- Root mount point for React -->
    <div id="root"></div>

    <!-- React Application Logic -->
    {% raw %}
    <script type="text/babel" data-type="module">
        import React, { useState, useEffect } from 'react';
        import { createRoot } from 'react-dom/client';
        import { Globe, Eye, EyeOff, CheckCircle2, AlertCircle, Moon, Sun, X } from 'lucide-react';

        // i18n Bridge
        const i18n = window.MasterSplitterI18n;

        const languageNames = {
            'he': 'עברית',
            'en': 'English',
            'es': 'Español',
            'ru': 'Русский',
            'ar': 'العربية',
            'fr': 'Français',
            'zh': '中文'
        };

        const SettingsSelectors = ({ currentLang, setLang, isDark, toggleTheme }) => {
            const [isLangOpen, setIsLangOpen] = useState(false);
            const languages = Object.keys(languageNames);
            
            const handleSelect = (langCode) => {
                setLang(langCode);
                setIsLangOpen(false);
            };

            return (
                <div className="flex gap-2 mt-4 w-full relative">
                    <div className="relative inline-block text-left flex-1">
                        <button type="button" onClick={() => setIsLangOpen(!isLangOpen)} className="w-full flex items-center justify-between px-4 py-3 bg-white/50 dark:bg-black/20 backdrop-blur-md rounded-xl border border-gray-200 dark:border-gray-700 text-sm font-medium transition-colors hover:bg-gray-50 dark:hover:bg-gray-800">
                            <div className="flex items-center gap-2">
                                <Globe size={18} className="text-blue-500" />
                                <span className="dark:text-white font-semibold">{languageNames[currentLang] || currentLang}</span>
                            </div>
                        </button>
                        {isLangOpen && (
                            <div className="absolute bottom-full mb-2 left-0 w-full bg-white dark:bg-gray-800 rounded-xl shadow-2xl border border-gray-100 dark:border-gray-700 z-[60] max-h-48 overflow-y-auto">
                                {languages.map((code) => (
                                    <button key={code} type="button" onClick={() => handleSelect(code)} className="w-full px-4 py-3 text-sm hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors flex justify-between items-center">
                                        <span className="font-medium dark:text-white">{languageNames[code]}</span>
                                        {currentLang === code && <CheckCircle2 size={16} className="text-green-500" />}
                                    </button>
                                ))}
                            </div>
                        )}
                    </div>
                    
                    <button type="button" onClick={toggleTheme} className="flex-none px-4 py-3 bg-white/50 dark:bg-black/20 backdrop-blur-md rounded-xl border border-gray-200 dark:border-gray-700 text-sm font-medium transition-colors hover:bg-gray-50 dark:hover:bg-gray-800 flex items-center justify-center text-gray-700 dark:text-gray-300">
                        {isDark ? <Sun size={18} /> : <Moon size={18} />}
                    </button>
                </div>
            );
        };

        const DynamicBackground = ({ isDark }) => {
            const darkCanvasRef = React.useRef(null);
            const lightCanvasRef = React.useRef(null);

            // Dark mode (stars)
            React.useEffect(() => {
                if (!isDark) return;
                const canvas = darkCanvasRef.current;
                if (!canvas) return;
                const ctx = canvas.getContext('2d');
                let animationFrameId;

                const resize = () => {
                    canvas.width = window.innerWidth;
                    canvas.height = window.innerHeight;
                };
                window.addEventListener('resize', resize);
                resize();

                const numStars = 150;
                const stars = Array.from({ length: numStars }).map(() => ({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    radius: Math.random() * 1.5,
                    speed: Math.random() * 0.5 + 0.1
                }));

                const draw = () => {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    ctx.fillStyle = 'white';
                    stars.forEach(star => {
                        ctx.globalAlpha = Math.random() * 0.5 + 0.5;
                        ctx.beginPath();
                        ctx.arc(star.x, star.y, star.radius, 0, Math.PI * 2);
                        ctx.fill();
                        star.y -= star.speed;
                        if (star.y < 0) {
                            star.y = canvas.height;
                            star.x = Math.random() * canvas.width;
                        }
                    });
                    animationFrameId = requestAnimationFrame(draw);
                };
                draw();

                return () => {
                    window.removeEventListener('resize', resize);
                    cancelAnimationFrame(animationFrameId);
                };
            }, [isDark]);

            // Light mode (doodles)
            React.useEffect(() => {
                if (isDark) return;
                const canvas = lightCanvasRef.current;
                if (!canvas) return;
                const ctx = canvas.getContext('2d');
                let animationFrameId;

                const resize = () => {
                    canvas.width = window.innerWidth;
                    canvas.height = window.innerHeight;
                };
                window.addEventListener('resize', resize);
                resize();

                const itemsList = ["E=mc²", "🍕", "∑", "x²+y²", "👓", "Δx", "{ }", "y=mx+b", "∫", "π", "±"];
                const numItems = 40;
                const items = Array.from({ length: numItems }).map(() => ({
                    text: itemsList[Math.floor(Math.random() * itemsList.length)],
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    speed: Math.random() * 0.3 + 0.1,
                    fontSize: Math.random() * 20 + 20, // 20px to 40px
                    rotation: (Math.random() - 0.5) * Math.PI / 2 // -45 to 45 deg
                }));

                const draw = () => {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    ctx.fillStyle = '#64748b'; // slate-500
                    ctx.globalAlpha = 0.08; // very low opacity (8%)
                    ctx.textAlign = "center";
                    ctx.textBaseline = "middle";
                    
                    items.forEach(item => {
                        ctx.save();
                        ctx.font = `bold ${item.fontSize}px monospace, sans-serif`;
                        ctx.translate(item.x, item.y);
                        ctx.rotate(item.rotation);
                        ctx.fillText(item.text, 0, 0);
                        ctx.restore();
                        
                        item.y -= item.speed;
                        if (item.y < -50) {
                            item.y = canvas.height + 50;
                            item.x = Math.random() * canvas.width;
                        }
                    });
                    animationFrameId = requestAnimationFrame(draw);
                };
                draw();

                return () => {
                    window.removeEventListener('resize', resize);
                    cancelAnimationFrame(animationFrameId);
                };
            }, [isDark]);

            return (
                <div className="fixed inset-0 overflow-hidden pointer-events-none transition-colors duration-500 bg-[#f8fafc] dark:bg-[#0f172a] -z-10">
                    <canvas 
                        ref={darkCanvasRef} 
                        className={`absolute inset-0 transition-opacity duration-700 ${isDark ? 'opacity-100' : 'opacity-0'}`} 
                    />
                    <canvas 
                        ref={lightCanvasRef} 
                        className={`absolute inset-0 transition-opacity duration-700 ${!isDark ? 'opacity-100' : 'opacity-0'}`} 
                    />
                </div>
            );
        };

        const CookieBanner = ({ t }) => {
            const [show, setShow] = useState(false);
            useEffect(() => {
                if (!localStorage.getItem('cookieConsent')) {
                    setShow(true);
                }
            }, []);
            if (!show) return null;
            return (
                <div className="fixed bottom-0 left-0 right-0 p-4 bg-white/90 dark:bg-slate-900/90 backdrop-blur-md border-t border-gray-200 dark:border-slate-700 z-[100] flex flex-col sm:flex-row items-center justify-between gap-4 text-sm text-gray-700 dark:text-slate-300 shadow-[0_-4px_20px_rgba(0,0,0,0.1)]">
                    <p className="text-center sm:text-left flex-1" aria-label="Cookie Policy Text">{t('cookieConsentText')}</p>
                    <button onClick={() => { localStorage.setItem('cookieConsent', 'true'); setShow(false); }} className="whitespace-nowrap px-6 py-2.5 bg-blue-600 hover:bg-blue-700 text-white rounded-xl font-medium transition-colors focus:outline-none focus:ring-2 focus:ring-blue-500 shadow-md" aria-label={t('cookieConsentBtn')}>
                        {t('cookieConsentBtn')}
                    </button>
                </div>
            );
        };

        const LEGAL_TEXTS = {
            terms: {
                title: 'תנאי שימוש - MasterSplitter',
                content: `ברוכים הבאים לאפליקציית MasterSplitter. השימוש באפליקציה כפוף לתנאים המפורטים להלן. בעצם התחברותך ושימושך במערכת, הנך מסכים לתנאים אלו במלואם.<br/><br/>
  <strong>1. מטרת השירות:</strong> האפליקציה נועדה לסייע בניהול, מעקב וחלוקת הוצאות כספיות בין משתמשים, חברים או שותפים לדירה. השירות מסופק "כמות שהוא" (As-Is).<br/>
  <strong>2. אחריות המשתמש:</strong> המשתמש אחראי לדיוק הנתונים המוזנים. הנהלת האפליקציה אינה נושאת באחריות לטעויות בחישובים, סכסוכים כספיים בין משתמשים, או אובדן מידע.<br/>
  <strong>3. חשבון ואבטחה:</strong> הנך אחראי לשמירת סודיות פרטי ההתחברות שלך. כל פעולה שתבוצע תחת חשבונך היא באחריותך הבלעדית.<br/>
  <strong>4. שינויים בשירות:</strong> הנהלת האפליקציה רשאית לעדכן, לשנות או להפסיק את השירות בכל עת וללא הודעה מוקדמת.<br/>
  <strong>5. קניין רוחני:</strong> כל זכויות היוצרים והקניין הרוחני באפליקציה (כולל עיצוב, קוד, ולוגו) שייכים ל-MasterSplitter.`
            },
            privacy: {
                title: 'מדיניות פרטיות - MasterSplitter',
                content: `פרטיותך חשובה לנו. מדיניות זו מפרטת כיצד אנו אוספים, שומרים ומשתמשים במידע שלך.<br/><br/>
  <strong>1. איסוף מידע:</strong> אנו אוספים מידע הנמסר על ידך בעת ההרשמה והשימוש (כגון כתובת אימייל, שמות, וסכומי הוצאות). כמו כן, אנו שומרים את העדפות השפה והעיצוב (Dark Mode) במכשירך באמצעות Local Storage.<br/>
  <strong>2. שימוש במידע:</strong> המידע משמש אך ורק לצורך תפעול האפליקציה, חלוקת ההוצאות ושירותי העזר החכם (AI). אנו לא מוכרים את המידע שלך לצדדים שלישיים.<br/>
  <strong>3. אבטחת מידע:</strong> אנו נוקטים באמצעי אבטחה מחמירים (כולל הצפנת תקשורת) כדי להגן על המידע שלך, בהתאם לחוק הגנת הפרטיות הישראלי ותקנות ה-GDPR.<br/>
  <strong>4. שימוש בבינה מלאכותית (AI):</strong> חלק מהפיצ'רים נעזרים במודלי AI צד-שלישי לצורך ניתוח (למשל סריקת קבלות או מתן טיפים). נתונים אלו מועברים בצורה מאובטחת וללא זיהוי אישי ככל הניתן.<br/>
  <strong>5. זכויותיך:</strong> זכותך לעיין במידע שנשמר אודותיך, לבקש את תיקונו או את מחיקתו המוחלטת ממערכותינו בכל עת.`
            }
        };

        const LegalModal = ({ data, onClose }) => {
            if (!data) return null;
            return (
                <div className="fixed inset-0 z-[200] flex items-center justify-center bg-black/50 backdrop-blur-sm p-4" onClick={onClose} role="dialog" aria-modal="true" aria-labelledby="modal-title">
                    <div className="bg-white dark:bg-slate-800 rounded-2xl max-w-lg w-full max-h-[85vh] overflow-hidden shadow-2xl flex flex-col" onClick={e => e.stopPropagation()}>
                        <div className="flex justify-between items-center p-4 border-b border-gray-200 dark:border-slate-700 bg-white dark:bg-slate-800">
                            <h3 id="modal-title" className="font-bold text-lg text-gray-900 dark:text-white" dir="rtl">{data.title}</h3>
                            <button onClick={onClose} aria-label="Close modal" className="text-gray-500 hover:text-gray-800 dark:text-gray-400 dark:hover:text-white focus:outline-none p-1 rounded-md hover:bg-gray-100 dark:hover:bg-slate-700 transition-colors">
                                <X size={20} />
                            </button>
                        </div>
                        <div className="p-6 overflow-y-auto text-sm text-gray-600 dark:text-gray-300 space-y-2 leading-relaxed" dir="rtl" dangerouslySetInnerHTML={{ __html: data.content }}></div>
                    </div>
                </div>
            );
        };

        const LegalFooter = ({ t, openModal }) => (
            <div className="mt-8 text-center text-sm font-medium text-gray-500 dark:text-gray-400 flex flex-col sm:flex-row items-center justify-center gap-3 sm:gap-4 relative z-10 w-full pb-8 pt-4">
                <button onClick={(e) => { e.preventDefault(); openModal(LEGAL_TEXTS.privacy); }} aria-label={t('privacyPolicy')} className="hover:text-blue-600 dark:hover:text-blue-400 transition-colors focus:outline-none focus:underline">{t('privacyPolicy')}</button>
                <span className="hidden sm:inline opacity-50">•</span>
                <button onClick={(e) => { e.preventDefault(); openModal(LEGAL_TEXTS.terms); }} aria-label={t('termsOfUse')} className="hover:text-blue-600 dark:hover:text-blue-400 transition-colors focus:outline-none focus:underline">{t('termsOfUse')}</button>
                <span className="hidden sm:inline opacity-50">•</span>
                <span aria-label={t('version')}>{t('version')}</span>
                <span className="hidden sm:inline opacity-50">•</span>
                <span aria-label={t('copyright')}>{t('copyright')}</span>
            </div>
        );

        const App = () => {
            const initialLang = localStorage.getItem('lang') || (i18n ? i18n.getCurrentLanguage() : 'he');
            const [lang, setLangState] = useState(initialLang);
            
            const initialDark = document.documentElement.classList.contains('dark');
            const [isDark, setIsDark] = useState(initialDark);
            
            const [authMode, setAuthMode] = useState('login'); // 'login' | 'signup'
            const [showPassword, setShowPassword] = useState(false);
            const [termsAgreed, setTermsAgreed] = useState(false);
            const [rememberMe, setRememberMe] = useState(false);
            
            const [emailInput, setEmailInput] = useState('');
            const [usernameInput, setUsernameInput] = useState('');
            const [phoneInput, setPhoneInput] = useState('');
            const [passwordInput, setPasswordInput] = useState('');
            
            const [errorMsg, setErrorMsg] = useState('');
            const [successMsg, setSuccessMsg] = useState('');
            const [fieldErrors, setFieldErrors] = useState({});
            
            const [modalContent, setModalContent] = useState(null);

            const setLang = (code) => {
                if (i18n) {
                    i18n.changeLanguage(code);
                    setLangState(code);
                    localStorage.setItem('lang', code);
                    // Update document properties immediately for CSS
                    document.documentElement.lang = code;
                    document.documentElement.dir = ['he', 'ar'].includes(code) ? 'rtl' : 'ltr';
                }
            };
            
            const toggleTheme = () => {
                const newTheme = isDark ? 'light' : 'dark';
                setIsDark(!isDark);
                localStorage.setItem('theme', newTheme);
                if (newTheme === 'dark') {
                    document.documentElement.classList.add('dark');
                    document.documentElement.classList.remove('light');
                } else {
                    document.documentElement.classList.remove('dark');
                    document.documentElement.classList.add('light');
                }
            };
            
            const t = (key) => i18n ? i18n.getTranslation(key) : key;

            const validateFields = () => {
                const errors = {};
                let valid = true;
                
                // Login validation uses emailInput as username or email based on backend legacy
                if (authMode === 'login') {
                    if (!emailInput.trim()) { errors.email = t('emptyUsername'); valid = false; }
                    if (!passwordInput.trim()) { errors.password = t('emptyPassword'); valid = false; }
                } else {
                    // Signup validation
                    if (!usernameInput.trim()) { errors.username = t('emptyUsername'); valid = false; }
                    if (!emailInput.trim()) { errors.email = t('emptyEmail'); valid = false; }
                    if (!phoneInput.trim()) { errors.phone = t('emptyPhone'); valid = false; }
                    if (!passwordInput.trim()) { errors.password = t('emptyPassword'); valid = false; }
                }
                
                if (!termsAgreed && authMode === 'signup') {
                    errors.terms = t('agreeTermsMsg');
                    valid = false;
                }

                setFieldErrors(errors);
                return valid;
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                setErrorMsg('');
                setFieldErrors({});
                
                if (!validateFields()) return;

                const endpoint = authMode === 'login' ? '/api/login' : '/api/signup';
                // For login, backend expects `username` which can be email or username
                const payload = authMode === 'login' 
                    ? { username: emailInput, password: passwordInput, remember: rememberMe }
                    : { username: usernameInput, email: emailInput, phone: phoneInput, password: passwordInput };

                try {
                    const res = await fetch(endpoint, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    const data = await res.json();
                    if (res.ok && data.success) {
                        window.location.href = '/app';
                    } else {
                        setErrorMsg(data.error || 'Network error');
                    }
                } catch (err) {
                    setErrorMsg('Network error');
                }
            };

            const handleForgotPassword = async (e) => {
                e.preventDefault();
                setErrorMsg('');
                setSuccessMsg('');
                if (!emailInput.trim()) {
                    setFieldErrors({ ...fieldErrors, email: t('emptyUsernameOrEmail') });
                    return;
                }
                
                try {
                    const res = await fetch('/api/forgot-password', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email: emailInput })
                    });
                    const data = await res.json();
                    if (res.ok && data.success) {
                        setSuccessMsg(t(data.message));
                    } else {
                        setErrorMsg(t(data.error) || 'Network error');
                    }
                } catch (err) {
                    setErrorMsg('Network error');
                }
            };

            return (
                <div className="min-h-screen overflow-y-auto pb-10 relative flex flex-col items-center justify-center">
                    <DynamicBackground isDark={isDark} />
                    
                    <div className="relative z-10 w-full max-w-[420px] px-6 py-12 flex flex-col items-center mt-8">
                        
                        {/* Exact Legacy Text Logo Replica */}
                        <div className="mb-8 text-center" style={{ filter: 'drop-shadow(0 4px 20px rgba(168, 85, 247, 0.4))' }}>
                            <h1 className="text-[3.2rem] leading-[1.1] font-black italic tracking-[-2px] flex flex-col items-center">
                                <span className="text-[#facc15]">MASTER</span>
                                <span className="text-[#1e293b] dark:text-white">SPLITTER</span>
                            </h1>
                        </div>
                        
                        <div className="w-full bg-white/95 dark:bg-slate-800/95 backdrop-blur-xl rounded-[2rem] p-8 shadow-2xl border border-white/50 dark:border-gray-700/50 space-y-6">
                            
                            <div className="text-center space-y-2">
                                <h2 className="text-2xl font-bold text-blue-600 dark:text-blue-400">{t('welcomeText')}</h2>
                                <p className="text-sm text-gray-500 dark:text-gray-400 font-medium">{t('welcomeSubtitle')}</p>
                            </div>
                            
                            <form className="space-y-4" onSubmit={handleSubmit} noValidate>
                                
                                {authMode === 'signup' && (
                                    <div>
                                        <input type="text" placeholder={t('username')} value={usernameInput} onChange={(e)=>{setUsernameInput(e.target.value); setFieldErrors({...fieldErrors, username: null})}} className={`w-full py-3 px-4 bg-gray-50 dark:bg-slate-900 border ${fieldErrors.username ? 'border-red-500' : 'border-gray-200 dark:border-gray-700'} rounded-xl outline-none dark:text-white transition-colors focus:ring-2 focus:ring-blue-500`} />
                                        {fieldErrors.username && <p className="text-red-500 text-xs mt-1 font-medium px-1 flex items-center gap-1"><AlertCircle size={12}/> {fieldErrors.username}</p>}
                                    </div>
                                )}

                                <div>
                                    <input type={authMode==='login'?"text":"email"} placeholder={authMode==='login' ? t('username') + " / " + t('email') : t('email')} value={emailInput} onChange={(e)=>{setEmailInput(e.target.value); setFieldErrors({...fieldErrors, email: null})}} className={`w-full py-3 px-4 bg-gray-50 dark:bg-slate-900 border ${fieldErrors.email ? 'border-red-500' : 'border-gray-200 dark:border-gray-700'} rounded-xl outline-none dark:text-white transition-colors focus:ring-2 focus:ring-blue-500`} />
                                    {fieldErrors.email && <p className="text-red-500 text-xs mt-1 font-medium px-1 flex items-center gap-1"><AlertCircle size={12}/> {fieldErrors.email}</p>}
                                </div>
                                
                                {authMode === 'signup' && (
                                    <div>
                                        <input type="tel" placeholder={t('phone')} value={phoneInput} onChange={(e)=>{setPhoneInput(e.target.value); setFieldErrors({...fieldErrors, phone: null})}} className={`w-full py-3 px-4 bg-gray-50 dark:bg-slate-900 border ${fieldErrors.phone ? 'border-red-500' : 'border-gray-200 dark:border-gray-700'} rounded-xl outline-none dark:text-white transition-colors focus:ring-2 focus:ring-blue-500`} />
                                        {fieldErrors.phone && <p className="text-red-500 text-xs mt-1 font-medium px-1 flex items-center gap-1"><AlertCircle size={12}/> {fieldErrors.phone}</p>}
                                    </div>
                                )}
                                
                                <div className="relative">
                                    <input type={showPassword ? "text" : "password"} placeholder={t('password')} value={passwordInput} onChange={(e)=>{setPasswordInput(e.target.value); setFieldErrors({...fieldErrors, password: null})}} className={`w-full py-3 px-4 bg-gray-50 dark:bg-slate-900 border ${fieldErrors.password ? 'border-red-500' : 'border-gray-200 dark:border-gray-700'} rounded-xl outline-none dark:text-white transition-colors focus:ring-2 focus:ring-blue-500 pr-10`} />
                                    <button type="button" onClick={() => setShowPassword(!showPassword)} aria-label="Toggle password visibility" className="absolute inset-y-0 end-3 flex items-center justify-center text-gray-400 hover:text-gray-600 dark:hover:text-gray-200">
                                        {showPassword ? <EyeOff size={18} /> : <Eye size={18} />}
                                    </button>
                                </div>
                                {fieldErrors.password && <p className="text-red-500 text-xs font-medium px-1 flex items-center gap-1 -mt-2"><AlertCircle size={12}/> {fieldErrors.password}</p>}

                                {authMode === 'login' && (
                                    <div className="flex items-center justify-between pt-1">
                                        <div className="flex items-center gap-2">
                                            <input type="checkbox" id="remember-me" checked={rememberMe} onChange={(e) => setRememberMe(e.target.checked)} className="w-4 h-4 rounded border-gray-300 text-blue-600 focus:ring-blue-600 cursor-pointer" />
                                            <label htmlFor="remember-me" className="text-sm text-gray-600 dark:text-gray-300 cursor-pointer select-none">{t('rememberMe')}</label>
                                        </div>
                                        <a href="#" onClick={handleForgotPassword} className="text-sm font-semibold text-blue-600 dark:text-blue-400 hover:underline">
                                            {t('forgotPassword')}
                                        </a>
                                    </div>
                                )}

                                {authMode === 'signup' && (
                                    <div className="flex items-start justify-start pt-2 gap-2 flex-col">
                                        <div className="flex items-center gap-2">
                                            <input type="checkbox" id="terms-agree" checked={termsAgreed} onChange={(e) => {setTermsAgreed(e.target.checked); setFieldErrors({...fieldErrors, terms: null})}} className="w-4 h-4 rounded border-gray-300 text-blue-600 focus:ring-blue-600 cursor-pointer mt-0.5" />
                                            <label htmlFor="terms-agree" className="text-sm text-gray-600 dark:text-gray-300 cursor-pointer select-none leading-tight flex flex-wrap gap-x-1 items-center">
                                                {lang === 'he' ? (
                                                    <>
                                                        <span>אני מסכים/ה ל</span>
                                                        <button type="button" onClick={(e) => { e.preventDefault(); e.stopPropagation(); setModalContent(LEGAL_TEXTS.terms); }} className="hover:text-blue-600 dark:hover:text-blue-400 underline transition-colors focus:outline-none">תנאי השימוש</button>
                                                        <span>ול</span>
                                                        <button type="button" onClick={(e) => { e.preventDefault(); e.stopPropagation(); setModalContent(LEGAL_TEXTS.privacy); }} className="hover:text-blue-600 dark:hover:text-blue-400 underline transition-colors focus:outline-none">מדיניות הפרטיות</button>
                                                    </>
                                                ) : lang === 'en' ? (
                                                    <>
                                                        <span>I agree to the</span>
                                                        <button type="button" onClick={(e) => { e.preventDefault(); e.stopPropagation(); setModalContent(LEGAL_TEXTS.terms); }} className="hover:text-blue-600 dark:hover:text-blue-400 underline transition-colors focus:outline-none">Terms</button>
                                                        <span>&</span>
                                                        <button type="button" onClick={(e) => { e.preventDefault(); e.stopPropagation(); setModalContent(LEGAL_TEXTS.privacy); }} className="hover:text-blue-600 dark:hover:text-blue-400 underline transition-colors focus:outline-none">Privacy Policy</button>
                                                    </>
                                                ) : (
                                                    <span>{t('termsAgree')}</span>
                                                )}
                                            </label>
                                        </div>
                                        {fieldErrors.terms && <p className="text-red-500 text-xs font-medium px-1 flex items-center gap-1"><AlertCircle size={12}/> {fieldErrors.terms}</p>}
                                    </div>
                                )}

                                <button type="submit" className="w-full py-3.5 mt-2 bg-gradient-to-r from-blue-600 to-purple-600 text-white font-bold rounded-xl shadow-lg shadow-blue-500/30 transition-transform active:scale-95 hover:opacity-90 flex items-center justify-center">
                                    {authMode === 'login' ? t('loginBtn') : t('signupBtn')}
                                </button>
                            </form>

                            {errorMsg && <div className="text-center text-red-500 mt-2 text-sm font-medium flex items-center justify-center gap-1"><AlertCircle size={14}/> {errorMsg}</div>}
                            {successMsg && <div className="text-center text-green-500 mt-2 text-sm font-medium flex items-center justify-center gap-1"><CheckCircle2 size={14}/> {successMsg}</div>}

                            <div className="pt-4 border-t border-gray-200 dark:border-gray-700 flex flex-col gap-3">
                                <button type="button" onClick={() => { window.location.href='/api/auth/google'; }} className="w-full py-3 px-4 flex items-center justify-center gap-2 bg-white dark:bg-slate-900 border border-gray-200 dark:border-gray-700 rounded-xl hover:bg-gray-50 dark:hover:bg-gray-800 transition-colors shadow-sm">
                                    <svg viewBox="0 0 24 24" width="20" height="20">
                                        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
                                        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                                        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                                        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                                    </svg>
                                    <span className="text-sm font-medium dark:text-white">{t('googleLogin')}</span>
                                </button>
                            </div>

                            <div className="text-center pt-2">
                                <button type="button" onClick={() => {
                                    setAuthMode(authMode === 'login' ? 'signup' : 'login');
                                    setFieldErrors({});
                                    setErrorMsg('');
                                }} className="text-sm font-medium text-gray-500 hover:text-blue-600 dark:text-gray-400 dark:hover:text-blue-400 transition-colors bg-transparent border-none cursor-pointer">
                                    {authMode === 'login' ? t('signup') : t('loginInstead')}
                                </button>
                            </div>
                            
                            <SettingsSelectors currentLang={lang} setLang={setLang} isDark={isDark} toggleTheme={toggleTheme} />
                        </div>
                        <LegalFooter t={t} openModal={setModalContent} />
                    </div>
                    
                    <CookieBanner t={t} />
                    <LegalModal data={modalContent} onClose={() => setModalContent(null)} />
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    {% endraw %}

    <!-- Permissions Onboarding Modal -->
    <div id="permissions-modal" class="fixed inset-0 z-50 flex items-center justify-center bg-black/40 backdrop-blur-sm transition-opacity duration-300 opacity-0" style="display: none;">
        <div class="bg-white dark:bg-gray-800 w-[90%] max-w-sm rounded-2xl shadow-2xl overflow-hidden transform transition-all scale-95 opacity-0" id="permissions-modal-content">
            <div class="p-6">
                <div class="w-12 h-12 rounded-full bg-indigo-100 dark:bg-indigo-900/40 flex items-center justify-center mx-auto mb-4">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
                    </svg>
                </div>
                <h3 class="text-xl font-bold text-center text-gray-900 dark:text-white mb-2" style="font-family: 'Heebo', sans-serif;">ברוך הבא! נשמח לכמה הרשאות:</h3>
                
                <div class="space-y-4 mt-6">
                    <div class="flex items-start gap-4 p-3 bg-gray-50 dark:bg-gray-700/30 rounded-xl">
                        <div class="text-2xl mt-1">📇</div>
                        <div>
                            <div class="font-bold text-gray-900 dark:text-white">אנשי קשר</div>
                            <div class="text-sm text-gray-500 dark:text-gray-400 mt-1">להזמנת חברים בקלות.</div>
                        </div>
                    </div>
                    
                    <div class="flex items-start gap-4 p-3 bg-gray-50 dark:bg-gray-700/30 rounded-xl">
                        <div class="text-2xl mt-1">🌗</div>
                        <div>
                            <div class="font-bold text-gray-900 dark:text-white">תצוגה</div>
                            <div class="text-sm text-gray-500 dark:text-gray-400 mt-1">להתאמת מצב כהה/בהיר.</div>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="p-4 border-t border-gray-100 dark:border-gray-700 bg-gray-50 dark:bg-gray-800/50">
                <button onclick="grantAppPermissions()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-xl transition-colors shadow-lg shadow-indigo-600/20">
                    אשר והמשך
                </button>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (localStorage.getItem('app_permissions_granted') !== 'true') {
                const modal = document.getElementById('permissions-modal');
                const content = document.getElementById('permissions-modal-content');
                modal.style.display = 'flex';
                // Trigger reflow for animation
                void modal.offsetWidth;
                modal.classList.remove('opacity-0');
                content.classList.remove('scale-95', 'opacity-0');
                content.classList.add('scale-100', 'opacity-100');
            }
        });

        function grantAppPermissions() {
            localStorage.setItem('app_permissions_granted', 'true');
            const modal = document.getElementById('permissions-modal');
            const content = document.getElementById('permissions-modal-content');
            
            modal.classList.add('opacity-0');
            content.classList.remove('scale-100', 'opacity-100');
            content.classList.add('scale-95', 'opacity-0');
            
            setTimeout(() => {
                modal.style.display = 'none';
            }, 300);
        }
    </script>

</body>
</html>
