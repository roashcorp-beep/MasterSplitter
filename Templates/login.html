<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MasterSplitter 🐢 - התחברות</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

    <div class="app-container">
        <div class="logo-area">
            <h1>MasterSplitter 🐢</h1>
            <p>פשוט לטייל. קל לחלק.</p>
        </div>

        <!-- Toggle for Login / Signup -->
        <div class="auth-toggle">
            <button id="toggle-login" class="active" onclick="setAuthMode('login')">התחברות</button>
            <button id="toggle-signup" onclick="setAuthMode('signup')">הרשמה</button>
        </div>

        <div id="auth-form">
            <div class="form-group" id="group-username">
                <label for="username">שם משתמש</label>
                <input type="text" id="username" placeholder="למשל: אבי, אלון...">
            </div>
            
            <div class="form-group">
                <label for="password">סיסמה</label>
                <input type="password" id="password" placeholder="הכנס סיסמה">
            </div>
            
            <button class="login-btn" id="submit-btn" onclick="submitAuth()">היכנס</button>
            
            <div class="divider">או</div>

            <button class="google-btn" onclick="alert('התחברות עם Google תתווסף בקרוב!')">
                <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" alt="Google Logo" width="20" height="20">
                התחבר עם Google
            </button>
        </div>
        
        <div class="error-message" id="error-msg"></div>
    </div>

    <script src="/static/js/main.js"></script>
</body>
</html>
