<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="MasterSplitter — אפליקציה לחלוקת הוצאות בטיולים עם חברים. עקבו אחרי מי שילם, חשבו יתרות, וסגרו חשבונות בקלות.">
    <title>MasterSplitter - התחברות</title>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="login-body">
    <div class="login-page-wrapper">

        <!-- Floating brand area -->
        <div class="login-brand">
            <h1 class="brand-title">
                <span class="purple-text">MASTER</span>
                <span class="dark-text">SPLITTER</span>
            </h1>
        </div>

        <!-- White floating card -->
        <div class="login-card">
            <h2 class="welcome-text" id="welcome-title">ברוך הבא! 👋</h2>
            <p class="welcome-sub" id="welcome-sub">התחבר כדי לנהל את ההוצאות שלך</p>

            <div id="auth-form">
                <div class="form-group">
                    <div class="floating-input-wrapper">
                        <span class="input-icon">👤</span>
                        <input type="text" id="username" placeholder=" " required autocomplete="username">
                        <label for="username">שם משתמש</label>
                    </div>
                </div>

                <div class="form-group">
                    <div class="floating-input-wrapper">
                        <span class="input-icon">🔒</span>
                        <input type="password" id="password" placeholder=" " required autocomplete="current-password">
                        <label for="password">סיסמה</label>
                    </div>
                </div>

                <div class="form-group signup-only" style="display: none;" id="email-group">
                    <div class="floating-input-wrapper">
                        <span class="input-icon">✉️</span>
                        <input type="email" id="email" placeholder=" ">
                        <label for="email">אימייל</label>
                    </div>
                </div>

                <div class="form-group signup-only" style="display: none;" id="phone-group">
                    <div class="floating-input-wrapper">
                        <span class="input-icon">📱</span>
                        <input type="tel" id="phone" placeholder=" ">
                        <label for="phone">מספר טלפון</label>
                    </div>
                </div>

                <button class="primary-btn full-width" id="submit-btn" onclick="submitAuth()">התחבר</button>

                <div class="divider">או</div>

                <button class="secondary-btn full-width" id="toggle-auth-btn" onclick="toggleAuthMode()">צור חשבון חדש</button>


            </div>

            <div class="error-message" id="error-msg"></div>
        </div>

    </div>
    <script src="/static/js/main.js"></script>
</body>
</html>
