<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="MasterSplitter — איפוס סיסמה">
    <title>MasterSplitter - איפוס סיסמה</title>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="login-body">
    <div class="login-page-wrapper">

        <div class="login-brand">
            <h1 class="brand-title">
                <span class="purple-text" data-i18n="brand_master">MASTER</span>
                <span class="dark-text" data-i18n="brand_splitter">SPLITTER</span>
            </h1>
        </div>

        <div class="login-card">
            <h2 class="welcome-text" data-i18n="reset_title">איפוס סיסמה 🔐</h2>
            <p class="welcome-sub" data-i18n="profile_new_pwd">הכנס סיסמה חדשה</p>

            <div id="reset-form">
                <div class="form-group">
                    <div class="floating-input-wrapper">
                        <span class="input-icon">🔒</span>
                        <input type="password" id="new-password" placeholder=" " required autocomplete="new-password">
                        <label for="new-password" data-i18n="profile_new_pwd">סיסמה חדשה</label>
                    </div>
                </div>

                <div class="form-group">
                    <div class="floating-input-wrapper">
                        <span class="input-icon">🔒</span>
                        <input type="password" id="confirm-password" placeholder=" " required autocomplete="new-password">
                        <label for="confirm-password" data-i18n="profile_confirm_pwd">אימות סיסמה</label>
                    </div>
                </div>

                <button class="primary-btn full-width" onclick="submitResetPassword()" data-i18n="reset_btn">עדכן סיסמה</button>

                <div style="text-align: center; margin-top: 16px;">
                    <a href="/" class="forgot-pwd" data-i18n="forgot_back">← חזור להתחברות</a>
                </div>
            </div>

            <div class="error-message" id="error-msg"></div>
            <div class="success-message" id="success-msg"></div>
        </div>

    </div>

    <script src="/static/js/translations.js"></script>
    <script>
        const RESET_TOKEN = "{{ token }}";

        async function submitResetPassword() {
            const password = document.getElementById('new-password').value;
            const confirm = document.getElementById('confirm-password').value;
            const errEl = document.getElementById('error-msg');
            const successEl = document.getElementById('success-msg');

            errEl.classList.remove('visible');
            successEl.classList.remove('visible');

            if (!password || !confirm) {
                errEl.textContent = i18n('err_fill_all');
                errEl.classList.add('visible');
                return;
            }
            if (password !== confirm) {
                errEl.textContent = 'הסיסמאות לא תואמות.';
                errEl.classList.add('visible');
                return;
            }
            if (password.length < 4) {
                errEl.textContent = 'סיסמה חייבת להיות לפחות 4 תווים.';
                errEl.classList.add('visible');
                return;
            }

            try {
                const res = await fetch(`/api/reset-password/${RESET_TOKEN}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password })
                });
                const data = await res.json();
                if (res.ok && data.success) {
                    successEl.textContent = data.message || i18n('toast_pwd_updated');
                    successEl.classList.add('visible');
                    document.getElementById('reset-form').style.display = 'none';
                    setTimeout(() => { window.location.href = '/'; }, 2000);
                } else {
                    errEl.textContent = data.error || 'שגיאה באיפוס הסיסמה.';
                    errEl.classList.add('visible');
                }
            } catch (e) {
                errEl.textContent = i18n('error_network');
                errEl.classList.add('visible');
            }
        }

        document.getElementById('confirm-password')?.addEventListener('keypress', e => {
            if (e.key === 'Enter') submitResetPassword();
        });
    </script>
</body>
</html>
