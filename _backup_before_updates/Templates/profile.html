<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>
    <link rel="stylesheet" href="/static/css/style.css">

    <script>
        const savedTheme = localStorage.getItem('theme') || 'dark';
        if (savedTheme === 'light') {
            document.documentElement.classList.add('light-theme');
        }
    </script>

    <style>
        body {
            font-family: 'Inter', 'Heebo', sans-serif;
            background-color: var(--bg-main, #0a0a1a);
            color: var(--text-main, #e2e8f0);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .profile-container {
            width: 100%;
            max-width: 500px;
            background: var(--surface-card, #12122a);
            border-radius: 24px;
            padding: 32px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border, rgba(255, 255, 255, 0.05));
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Back Button */
        .header-actions {
            width: 100%;
            display: flex;
            justify-content: flex-start;
            margin-bottom: 20px;
        }

        .icon-back-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-main, #e2e8f0);
            width: 40px;
            height: 40px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            padding: 0;
        }

        .icon-back-btn:hover {
            background: rgba(168, 85, 247, 0.2);
            border-color: #a855f7;
            transform: translateX(3px);
        }

        /* Avatar */
        .avatar-wrapper {
            position: relative;
            width: 120px;
            height: 120px;
            border-radius: 50%;
            cursor: pointer;
            background: linear-gradient(135deg, #a855f7, #ec4899);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 42px;
            font-weight: bold;
            color: white;
            box-shadow: 0 8px 20px rgba(168, 85, 247, 0.4);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            overflow: hidden;
            margin-bottom: 16px;
        }

        .avatar-wrapper:hover {
            transform: scale(1.05);
            box-shadow: 0 12px 25px rgba(168, 85, 247, 0.6);
        }

        .avatar-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }

        .avatar-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
            color: white;
        }

        .avatar-wrapper:hover .avatar-overlay {
            opacity: 1;
        }

        #avatarInput {
            display: none;
        }

        /* User Details */
        .user-name {
            font-size: 24px;
            font-weight: 700;
            margin: 0 0 8px 0;
            text-align: center;
        }

        .user-email {
            font-size: 14px;
            color: var(--text-muted, #94a3b8);
            margin: 0 0 32px 0;
            text-align: center;
        }

        /* Accordions */
        .accordion-item {
            width: 100%;
            margin-bottom: 12px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: background 0.3s ease;
        }

        .accordion-header {
            padding: 16px 20px;
            cursor: pointer;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .accordion-header:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .accordion-content {
            display: none;
            padding: 0 20px 20px 20px;
        }

        .accordion-content.expanded {
            display: block;
        }

        /* Inputs & Buttons */
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 16px;
        }

        input,
        select {
            width: 100%;
            padding: 12px 16px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(0, 0, 0, 0.2);
            color: var(--text-main, #e2e8f0);
            font-family: inherit;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        input:focus,
        select:focus {
            border-color: #a855f7;
        }

        button.action-btn {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: none;
            background: linear-gradient(135deg, #a855f7, #ec4899);
            color: white;
            font-weight: bold;
            font-family: inherit;
            cursor: pointer;
            transition: opacity 0.3s ease, transform 0.1s ease;
        }

        button.action-btn:hover {
            opacity: 0.9;
        }

        button.action-btn:active {
            transform: scale(0.98);
        }

        .hidden {
            display: none !important;
        }

        .feedback {
            font-size: 13px;
            margin-top: 4px;
        }

        .feedback.success {
            color: #4ade80;
        }

        .feedback.error {
            color: #f87171;
        }

        /* ====================================================
           LIGHT THEME FIXES
           ==================================================== */
        .light-theme .profile-container {
            background: #ffffff;
            border-color: #e2e8f0;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }

        .light-theme .accordion-item {
            background: #f8fafc;
            border-color: #e2e8f0;
        }

        .light-theme .accordion-header:hover {
            background: #f1f5f9;
        }

        .light-theme input,
        .light-theme select {
            background: #ffffff;
            border: 1px solid #94a3b8;
            color: #0f172a;
            box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.05);
        }

        .light-theme input:focus,
        .light-theme select:focus {
            border-color: #a855f7;
            box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.15);
        }

        .light-theme .user-name {
            color: #0f172a;
        }

        .light-theme .user-email {
            color: #475569;
        }

        .light-theme .icon-back-btn {
            color: #0f172a;
            border-color: #cbd5e1;
            background: #f8fafc;
        }

        .light-theme .icon-back-btn:hover {
            background: #e2e8f0;
        }
    </style>
</head>

<body>

    <div class="profile-container">
        <div class="header-actions">
            <button class="icon-back-btn" onclick="window.location.href='/app'" title="חזור">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="9 18 15 12 9 6"></polyline>
                </svg>
            </button>
        </div>

        <div class="avatar-wrapper" id="avatarWrapper" title="החלף תמונת פרופיל">
            <span id="avatarInitials">?</span>
            <img id="avatarImg" class="avatar-image" alt="User Avatar">
            <div class="avatar-overlay">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
                    <circle cx="12" cy="13" r="4"></circle>
                </svg>
            </div>
            <input type="file" id="avatarInput" accept="image/*">
        </div>

        <h2 class="user-name" id="userNameDisplay">טוען...</h2>
        <p class="user-email" id="userEmailDisplay">טוען...</p>

        <div class="accordion-item">
            <div class="accordion-header" onclick="toggleAccordion('usernameAcc')">
                <span>שינוי שם משתמש</span>
                <span class="chevron">▼</span>
            </div>
            <div class="accordion-content" id="usernameAcc">
                <div class="input-group" style="margin-top: 10px;">
                    <input type="text" id="usernameInput" placeholder="שם משתמש חדש">
                </div>
                <button class="action-btn" onclick="saveUsername()">שמור</button>
                <div id="usernameFeedback" class="feedback"></div>
            </div>
        </div>

        <div class="accordion-item">
            <div class="accordion-header" onclick="toggleAccordion('languageAcc')">
                <span>שינוי שפה</span>
                <span class="chevron">▼</span>
            </div>
            <div class="accordion-content" id="languageAcc">
                <div class="input-group" style="margin-top: 10px;">
                    <select id="languageSelect">
                        <option value="he">עברית</option>
                        <option value="en">English</option>
                    </select>
                </div>
                <button class="action-btn" onclick="saveLanguage()" style="margin-top: 10px;">שמור שפה</button>
                <div id="languageFeedback" class="feedback"></div>
            </div>
        </div>

        <div class="accordion-item">
            <div class="accordion-header" onclick="toggleAccordion('passwordAcc')">
                <span>שינוי סיסמה</span>
                <span class="chevron">▼</span>
            </div>
            <div class="accordion-content" id="passwordAcc">
                <div id="step1Password" style="margin-top: 10px;">
                    <div class="input-group">
                        <input type="password" id="currentPassword" placeholder="סיסמה נוכחית">
                    </div>
                    <button class="action-btn" onclick="verifyPassword()">בדיקה</button>
                    <div id="verifyFeedback" class="feedback"></div>
                </div>

                <div id="step2Password" class="hidden" style="margin-top: 10px;">
                    <div class="input-group">
                        <input type="password" id="newPassword" placeholder="סיסמה חדשה">
                    </div>
                    <div class="input-group">
                        <input type="password" id="confirmNewPassword" placeholder="אימות סיסמה חדשה">
                    </div>
                    <button class="action-btn" onclick="changePassword()">אישור</button>
                    <div id="changePasswordFeedback" class="feedback"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/js/main.js"></script>

    <script>
        // שינינו את השם של המשתנה כדי שלא יתנגש עם main.js!
        let profileUserData = null;

        document.addEventListener('DOMContentLoaded', () => {
            if (localStorage.getItem('theme') === 'light') {
                document.body.classList.add('light-theme');
            }
            fetchUserData();
        });

        async function fetchUserData() {
            try {
                const res = await fetch('/api/me');
                if (res.ok) {
                    const data = await res.json();
                    profileUserData = data;
                    renderUserData();
                } else {
                    window.location.href = '/';
                }
            } catch (err) {
                console.error('Error fetching user data', err);
                document.getElementById('userNameDisplay').textContent = 'שגיאת תקשורת';
                document.getElementById('userEmailDisplay').textContent = 'אנא נסה לרענן את העמוד';
            }
        }

        function renderUserData() {
            if (!profileUserData) return;

            document.getElementById('userNameDisplay').textContent = profileUserData.name || 'משתמש לא ידוע';
            document.getElementById('userEmailDisplay').textContent = profileUserData.email || 'לא מוגדר אימייל';

            document.getElementById('usernameInput').value = profileUserData.name || '';
            const langSelect = document.getElementById('languageSelect');
            if (langSelect) langSelect.value = profileUserData.language || 'he';

            const initials = document.getElementById('avatarInitials');
            const img = document.getElementById('avatarImg');

            if (profileUserData.avatar_url) {
                img.src = profileUserData.avatar_url;
                img.style.display = 'block';
                initials.style.display = 'none';
            } else {
                const nameStr = profileUserData.name || '?';
                const words = nameStr.trim().split(/\s+/);
                let initText = '';

                if (words.length >= 2) {
                    initText = words[0].charAt(0) + words[1].charAt(0);
                } else {
                    initText = nameStr.substring(0, 2);
                }

                initials.textContent = initText.toUpperCase();
                img.style.display = 'none';
                initials.style.display = 'block';
            }

            try {
                if (typeof setupCustomDropdowns === 'function') {
                    setupCustomDropdowns();
                }
            } catch (e) {
                console.error("Custom dropdown failed, using native:", e);
            }
        }

        const avatarWrapper = document.getElementById('avatarWrapper');
        const avatarInput = document.getElementById('avatarInput');

        avatarWrapper.addEventListener('click', () => {
            avatarInput.click();
        });

        avatarInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const formData = new FormData();
            formData.append('avatar', file);

            try {
                const res = await fetch('/api/upload-avatar', {
                    method: 'POST',
                    body: formData
                });
                const data = await res.json();
                if (data.success) {
                    profileUserData.avatar_url = data.avatar_url;
                    renderUserData();
                } else {
                    alert('שגיאה בהעלאת התמונה: ' + (data.error || 'שגיאה לא ידועה'));
                }
            } catch (err) {
                console.error('Upload error', err);
                alert('שגיאה בחיבור לשרת');
            }
        });

        function toggleAccordion(id) {
            const content = document.getElementById(id);
            const isCurrentlyExpanded = content.classList.contains('expanded');

            document.querySelectorAll('.accordion-content').forEach(el => {
                el.classList.remove('expanded');
            });

            if (!isCurrentlyExpanded) {
                content.classList.add('expanded');
            }
        }

        async function saveUsername() {
            const newName = document.getElementById('usernameInput').value.trim();
            const feedback = document.getElementById('usernameFeedback');
            feedback.textContent = '';

            if (!newName) {
                feedback.textContent = 'יש להזין שם משתמש';
                feedback.className = 'feedback error';
                return;
            }

            try {
                const res = await fetch('/api/profile', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name: newName })
                });
                const data = await res.json();
                if (data.success) {
                    feedback.textContent = 'שם המשתמש עודכן בהצלחה';
                    feedback.className = 'feedback success';
                    profileUserData.name = newName;
                    renderUserData();
                } else {
                    feedback.textContent = data.error || 'שגיאה בעדכון';
                    feedback.className = 'feedback error';
                }
            } catch (err) {
                feedback.textContent = 'שגיאה בחיבור לשרת';
                feedback.className = 'feedback error';
            }
        }

        async function saveLanguage() {
            const lang = document.getElementById('languageSelect').value;
            const feedback = document.getElementById('languageFeedback');
            feedback.textContent = '';

            try {
                const res = await fetch('/api/profile', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ language: lang })
                });
                const data = await res.json();
                if (data.success) {
                    feedback.textContent = 'השפה עודכנה בהצלחה, מרענן...';
                    feedback.className = 'feedback success';
                    setTimeout(() => {
                        window.location.reload();
                    }, 1000);
                } else {
                    feedback.textContent = data.error || 'שגיאה בעדכון';
                    feedback.className = 'feedback error';
                }
            } catch (err) {
                feedback.textContent = 'שגיאה בחיבור לשרת';
                feedback.className = 'feedback error';
            }
        }

        async function verifyPassword() {
            const currentPassword = document.getElementById('currentPassword').value;
            const feedback = document.getElementById('verifyFeedback');
            feedback.textContent = '';

            if (!currentPassword) {
                feedback.textContent = 'יש להזין סיסמה נוכחית';
                feedback.className = 'feedback error';
                return;
            }

            try {
                const res = await fetch('/api/verify-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ current_password: currentPassword })
                });
                const data = await res.json();
                if (data.success) {
                    feedback.textContent = '';
                    document.getElementById('step1Password').classList.add('hidden');
                    document.getElementById('step2Password').classList.remove('hidden');
                } else {
                    feedback.textContent = data.error || 'סיסמה שגויה';
                    feedback.className = 'feedback error';
                }
            } catch (err) {
                feedback.textContent = 'שגיאה בחיבור לשרת';
                feedback.className = 'feedback error';
            }
        }

        async function changePassword() {
            const currentPassword = document.getElementById('currentPassword').value;
            const newPassword = document.getElementById('newPassword').value;
            const confirmPass = document.getElementById('confirmNewPassword').value;
            const feedback = document.getElementById('changePasswordFeedback');
            feedback.textContent = '';

            if (!newPassword || !confirmPass) {
                feedback.textContent = 'יש למלא את כל השדות';
                feedback.className = 'feedback error';
                return;
            }

            if (newPassword !== confirmPass) {
                feedback.textContent = 'הסיסמאות אינן תואמות';
                feedback.className = 'feedback error';
                return;
            }

            try {
                const res = await fetch('/api/profile/change-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ current_password: currentPassword, new_password: newPassword })
                });
                const data = await res.json();
                if (data.success) {
                    feedback.textContent = 'הסיסמה שונתה בהצלחה';
                    feedback.className = 'feedback success';

                    setTimeout(() => {
                        document.getElementById('currentPassword').value = '';
                        document.getElementById('newPassword').value = '';
                        document.getElementById('confirmNewPassword').value = '';
                        document.getElementById('step2Password').classList.add('hidden');
                        document.getElementById('step1Password').classList.remove('hidden');
                        feedback.textContent = '';
                        toggleAccordion('passwordAcc');
                    }, 2000);
                } else {
                    feedback.textContent = data.error || 'שגיאה בעדכון הסיסמה';
                    feedback.className = 'feedback error';
                }
            } catch (err) {
                feedback.textContent = 'שגיאה בחיבור לשרת';
                feedback.className = 'feedback error';
            }
        }
    </script>
</body>

</html>
