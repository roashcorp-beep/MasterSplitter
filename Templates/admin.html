<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MasterSplitter // Cloud Admin</title>
    <!-- Premium sans-serif font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- JetBrains Mono for logs -->
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/admin.css">

    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "react/jsx-runtime": "https://esm.sh/react@18.2.0/jsx-runtime",
        "lucide-react": "https://esm.sh/lucide-react@0.292.0"
      }
    }
    </script>

</head>
<body>
    <div class="app-background"></div>
    <div class="container">
        <header class="glass-panel">
            <div class="logo-section">
                <h1>MASTERSPLITTER <span class="badge">SaaS CLOUD</span></h1>
            </div>
            <div class="status-indicator">
                <span class="dot blinking"></span> <span class="status-text">SYSTEM ONLINE</span>
            </div>
        </header>

        <main>
            <!-- Telemetry Grid -->
            <section class="telemetry-grid">
                <!-- Architect -->
                <div class="card glass-panel" data-role="architect">
                    <div class="card-header">
                        <h3>ARCHITECT</h3>
                        <div class="score-ring">
                            <svg viewBox="0 0 36 36" class="circular-chart cyber-cyan">
                                <path class="circle-bg" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                                <path class="circle" stroke-dasharray="98, 100" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                                <text x="18" y="20.35" class="percentage">98</text>
                            </svg>
                        </div>
                    </div>
                    <div class="productivity-section">
                        <span class="label">Live Productivity</span>
                        <div class="progress-bar-container">
                            <div class="progress-bar cyber-cyan-bg" style="width: 85%;"></div>
                        </div>
                        <span class="prod-value">85%</span>
                    </div>
                </div>

                <!-- Developer -->
                <div class="card glass-panel" data-role="developer">
                    <div class="card-header">
                        <h3>DEVELOPER</h3>
                        <div class="score-ring">
                            <svg viewBox="0 0 36 36" class="circular-chart emerald-green">
                                <path class="circle-bg" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                                <path class="circle" stroke-dasharray="95, 100" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                                <text x="18" y="20.35" class="percentage">95</text>
                            </svg>
                        </div>
                    </div>
                    <div class="productivity-section">
                        <span class="label">Live Productivity</span>
                        <div class="progress-bar-container">
                            <div class="progress-bar emerald-green-bg" style="width: 90%;"></div>
                        </div>
                        <span class="prod-value">90%</span>
                    </div>
                </div>

                <!-- QA Engineer -->
                <div class="card glass-panel" data-role="qa">
                    <div class="card-header">
                        <h3>QA ENGINEER</h3>
                        <div class="score-ring">
                            <svg viewBox="0 0 36 36" class="circular-chart electric-purple">
                                <path class="circle-bg" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                                <path class="circle" stroke-dasharray="99, 100" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                                <text x="18" y="20.35" class="percentage">99</text>
                            </svg>
                        </div>
                    </div>
                    <div class="productivity-section">
                        <span class="label">Live Productivity</span>
                        <div class="progress-bar-container">
                            <div class="progress-bar electric-purple-bg" style="width: 92%;"></div>
                        </div>
                        <span class="prod-value">92%</span>
                    </div>
                </div>

                <!-- DevOps -->
                <div class="card glass-panel" data-role="devops">
                    <div class="card-header">
                        <h3>DEVOPS</h3>
                        <div class="score-ring">
                            <svg viewBox="0 0 36 36" class="circular-chart cyber-cyan">
                                <path class="circle-bg" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                                <path class="circle" stroke-dasharray="96, 100" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                                <text x="18" y="20.35" class="percentage">96</text>
                            </svg>
                        </div>
                    </div>
                    <div class="productivity-section">
                        <span class="label">Live Productivity</span>
                        <div class="progress-bar-container">
                            <div class="progress-bar cyber-cyan-bg" style="width: 88%;"></div>
                        </div>
                        <span class="prod-value">88%</span>
                    </div>
                </div>

                <!-- Product Mgr -->
                <div class="card glass-panel" data-role="product">
                    <div class="card-header">
                        <h3>PRODUCT MGR</h3>
                        <div class="score-ring">
                            <svg viewBox="0 0 36 36" class="circular-chart emerald-green">
                                <path class="circle-bg" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                                <path class="circle" stroke-dasharray="94, 100" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                                <text x="18" y="20.35" class="percentage">94</text>
                            </svg>
                        </div>
                    </div>
                    <div class="productivity-section">
                        <span class="label">Live Productivity</span>
                        <div class="progress-bar-container">
                            <div class="progress-bar emerald-green-bg" style="width: 89%;"></div>
                        </div>
                        <span class="prod-value">89%</span>
                    </div>
                </div>
            </section>

            <!-- Logs Section -->
            <section class="logs-section glass-panel">
                <div class="logs-header">
                    <h2><span class="icon"></span> System Logs</h2>
                    <div class="log-controls">
                        <button id="clear-logs-btn" class="admin-btn clear-btn">Clear Logs</button>
                        <button id="toggle-poll-btn" class="admin-btn live-btn active">Live</button>
                    </div>
                    <div class="poll-status" id="poll-status">Polling: 3s</div>
                </div>
                <div class="log-container-wrapper">
                    <div class="log-window" id="log-container">
                        <!-- Logs will be injected here -->
                    </div>
                    <!-- Faded gradient for scroll effect -->
                    <div class="log-fade-bottom"></div>
                </div>
            </section>
        </main>
    </div>

    <!-- Hidden div to store the admin key for the JS fetch requests -->
    <div id="admin-key-storage" data-key="{{ admin_key }}" style="display: none;"></div>
    
    <script src="/static/js/admin.js"></script>
</body>
</html>
