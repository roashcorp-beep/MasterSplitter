<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MasterSplitter - Login</title>
    
    <!-- Step 1 Isolated i18n Engine -->
    <script src="{{ url_for('static', filename='js/i18n.js') }}"></script>

    <!-- React & Tailwind CDNs -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: { sans: ['system-ui', 'sans-serif'] }
          }
        }
      }
    </script>
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.344.0"
      }
    }
    </script>
    <!-- Babel Standalone -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-50 dark:bg-slate-900 overflow-hidden font-sans text-gray-900 dark:text-gray-100">
    <!-- Root mount point for React -->
    <div id="root"></div>

    <!-- React Application Logic -->
    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef } from 'react';
        import { createRoot } from 'react-dom/client';
        import { Globe, Eye, EyeOff, CheckCircle2, AlertCircle } from 'lucide-react';

        // i18n Bridge
        const i18n = window.MasterSplitterI18n;

        const StarsIntro = ({ onComplete }) => {
            const canvasRef = useRef(null);

            useEffect(() => {
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                let animationFrameId;
                let startTime = Date.now();
                const DURATION = 1500; // 1.5 seconds

                const resize = () => {
                    canvas.width = window.innerWidth;
                    canvas.height = window.innerHeight;
                };
                window.addEventListener('resize', resize);
                resize();

                const centerX = canvas.width / 2;
                const centerY = canvas.height / 2;

                const stars = Array.from({ length: 150 }).map(() => ({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 2 + 1,
                    speed: Math.random() * 0.05 + 0.02
                }));

                const render = () => {
                    const elapsed = Date.now() - startTime;
                    const progress = Math.min(elapsed / DURATION, 1);
                    
                    ctx.fillStyle = '#0f172a'; // slate-900
                    ctx.fillRect(0, 0, canvas.width, canvas.height);

                    ctx.fillStyle = '#ffffff';
                    stars.forEach(star => {
                        // Move towards center
                        const dx = centerX - star.x;
                        const dy = centerY - star.y;
                        
                        // Increase speed exponentially as time passes
                        const easeIn = progress * progress * progress;
                        star.x += dx * star.speed * (1 + easeIn * 10);
                        star.y += dy * star.speed * (1 + easeIn * 10);

                        ctx.beginPath();
                        ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                        ctx.fill();
                    });

                    if (elapsed < DURATION) {
                        animationFrameId = requestAnimationFrame(render);
                    } else {
                        // Trigger fade out in CSS, wait for it
                        canvas.style.opacity = '0';
                        setTimeout(() => {
                            if (onComplete) onComplete();
                        }, 500); // match transition duration
                    }
                };

                render();

                return () => {
                    window.removeEventListener('resize', resize);
                    cancelAnimationFrame(animationFrameId);
                };
            }, [onComplete]);

            return (
                <canvas 
                    ref={canvasRef} 
                    className="fixed inset-0 z-50 pointer-events-none transition-opacity duration-500 ease-in-out opacity-100"
                />
            );
        };

        const LanguageSelector = ({ currentLang, setLang }) => {
            const [isOpen, setIsOpen] = useState(false);
            const languages = ['he', 'en', 'es', 'ru', 'ar', 'fr', 'zh'];
            
            const handleSelect = (langCode) => {
                setLang(langCode);
                setIsOpen(false);
            };

            // Calculate translation for language names if available, else uppercase
            const getLangLabel = (code) => {
                return code.toUpperCase();
            };

            return (
                <div className="relative inline-block text-left mt-4 w-full">
                    <button type="button" onClick={() => setIsOpen(!isOpen)} className="w-full flex items-center justify-between px-4 py-3 bg-white/50 dark:bg-black/20 backdrop-blur-md rounded-xl border border-gray-200 dark:border-gray-700 text-sm font-medium transition-colors hover:bg-gray-50 dark:hover:bg-gray-800">
                        <div className="flex items-center gap-2">
                            <Globe size={18} className="text-blue-500" />
                            <span className="dark:text-white uppercase font-semibold">{currentLang}</span>
                        </div>
                    </button>
                    {isOpen && (
                        <div className="absolute bottom-full mb-2 left-0 w-full bg-white dark:bg-gray-800 rounded-xl shadow-2xl border border-gray-100 dark:border-gray-700 z-[60] max-h-48 overflow-y-auto">
                            {languages.map((code) => (
                                <button key={code} type="button" onClick={() => handleSelect(code)} className="w-full px-4 py-3 text-sm hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors uppercase flex justify-between items-center">
                                    <span className="font-medium dark:text-white">{code}</span>
                                    {currentLang === code && <CheckCircle2 size={16} className="text-green-500" />}
                                </button>
                            ))}
                        </div>
                    )}
                </div>
            );
        };

        const App = () => {
            const [introDone, setIntroDone] = useState(false);
            const [lang, setLangState] = useState(i18n ? i18n.getCurrentLanguage() : 'he');
            const [showPassword, setShowPassword] = useState(false);
            const [termsAgreed, setTermsAgreed] = useState(false);
            
            const [emailInput, setEmailInput] = useState('');
            const [passwordInput, setPasswordInput] = useState('');
            const [errorMsg, setErrorMsg] = useState('');

            const setLang = (code) => {
                if (i18n) {
                    i18n.changeLanguage(code);
                    setLangState(code);
                }
            };
            
            // Re-render when lang changes
            const t = (key) => i18n ? i18n.getTranslation(key) : key;

            const handleSubmit = async (e) => {
                e.preventDefault();
                setErrorMsg('');
                
                if (!termsAgreed) {
                    setErrorMsg("Please agree to the Terms & Privacy policy first.");
                    return;
                }

                try {
                    const res = await fetch('/api/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ username: emailInput, password: passwordInput })
                    });
                    const data = await res.json();
                    if (res.ok && data.success) {
                        window.location.href = '/app';
                    } else {
                        setErrorMsg(data.error || 'Network error');
                    }
                } catch (err) {
                    setErrorMsg('Network error');
                }
            };

            return (
                <>
                    {!introDone && <StarsIntro onComplete={() => setIntroDone(true)} />}
                    
                    <div className={`min-h-screen relative flex items-center justify-center transition-opacity duration-1000 ${introDone ? 'opacity-100' : 'opacity-0'}`}>
                        <div className="absolute inset-0 bg-gradient-to-br from-blue-50 to-purple-50 dark:from-slate-900 dark:to-blue-950 transition-colors" />
                        
                        <div className="relative z-10 w-full max-w-[420px] px-6 py-12 flex flex-col items-center">
                            {/* Glasses SVG Logo */}
                            <div className="mb-8 drop-shadow-2xl">
                                <svg width="100" height="60" viewBox="0 0 100 60" fill="none">
                                    <path d="M15 25C15 19.4772 19.4772 15 25 15H35C40.5228 15 45 19.4772 45 25V35C45 40.5228 40.5228 45 35 45H25C19.4772 45 15 40.5228 15 35V25Z" className="fill-blue-600 dark:fill-blue-500" />
                                    <path d="M55 25C55 19.4772 59.4772 15 65 15H75C80.5228 15 85 19.4772 85 25V35C85 40.5228 80.5228 45 75 45H65C59.4772 45 55 40.5228 55 35V25Z" className="fill-blue-600 dark:fill-blue-500" />
                                    <path d="M45 30H55" stroke="currentColor" strokeWidth="4" strokeLinecap="round" className="text-blue-600 dark:text-blue-500" />
                                </svg>
                            </div>
                            
                            <div className="w-full bg-white/90 dark:bg-gray-800/90 backdrop-blur-xl rounded-[2.5rem] p-8 shadow-2xl border border-white/50 dark:border-gray-700/50 space-y-6">
                                <h2 className="text-2xl font-bold text-center dark:text-white">{t('loginTitle')}</h2>
                                
                                <form className="space-y-4" onSubmit={handleSubmit}>
                                    <input type="text" placeholder={t('email')} value={emailInput} onChange={(e)=>setEmailInput(e.target.value)} required className="w-full py-3 px-4 bg-gray-50 dark:bg-gray-900 border border-gray-200 dark:border-gray-700 rounded-xl outline-none dark:text-white transition-colors focus:ring-2 focus:ring-blue-500" />
                                    
                                    <div className="relative">
                                        <input type={showPassword ? "text" : "password"} placeholder={t('password')} value={passwordInput} onChange={(e)=>setPasswordInput(e.target.value)} required aria-required="true" className="w-full py-3 px-4 bg-gray-50 dark:bg-gray-900 border border-gray-200 dark:border-gray-700 rounded-xl outline-none dark:text-white transition-colors focus:ring-2 focus:ring-blue-500" />
                                        <button type="button" onClick={() => setShowPassword(!showPassword)} aria-label="Toggle password visibility" className="absolute inset-y-0 end-3 flex items-center justify-center text-gray-400 hover:text-gray-600 dark:hover:text-gray-200">
                                            {showPassword ? <EyeOff size={18} /> : <Eye size={18} />}
                                        </button>
                                    </div>

                                    <div className="flex items-center justify-start pt-2 gap-2">
                                        <input type="checkbox" id="terms-agree" checked={termsAgreed} onChange={(e) => setTermsAgreed(e.target.checked)} className="w-4 h-4 rounded border-gray-300 text-blue-600 focus:ring-blue-600 cursor-pointer" />
                                        <label htmlFor="terms-agree" className="text-sm text-gray-600 dark:text-gray-300 cursor-pointer select-none">{t('termsAgree')}</label>
                                    </div>

                                    <button type="submit" className="w-full py-4 mt-2 bg-blue-600 text-white font-bold rounded-2xl shadow-lg shadow-blue-500/30 transition-all active:scale-95 hover:bg-blue-700 flex items-center justify-center">
                                        {t('loginBtn')}
                                    </button>
                                </form>

                                {errorMsg && <div className="text-center text-red-500 mt-2 text-sm font-medium flex items-center justify-center gap-1"><AlertCircle size={14}/> {errorMsg}</div>}

                                <div className="pt-2 border-t border-gray-200 dark:border-gray-700 mt-4 flex flex-col gap-3">
                                    <button type="button" onClick={() => { window.location.href='/api/auth/google'; }} className="w-full py-3 px-4 flex items-center justify-center gap-2 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors shadow-sm">
                                        <svg viewBox="0 0 24 24" width="20" height="20">
                                            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
                                            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                                            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                                            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                                        </svg>
                                        <span className="text-sm font-medium dark:text-white">{t('googleLogin')}</span>
                                    </button>
                                </div>
                                
                                <LanguageSelector currentLang={lang} setLang={setLang} />
                            </div>
                        </div>
                    </div>
                </>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
